<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0D0D0D">
<title>DMF Spec</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--s1:#181818;--s2:#222;--s3:#2A2A2A;
  --gold:#C8A96E;--gold-d:rgba(200,169,110,.18);--gold-b:rgba(200,169,110,.35);
  --txt:#fff;--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.28);
  --bdr:rgba(255,255,255,.07);
  --danger:#FF5252;--danger-d:rgba(255,82,82,.14);
  --warn:#FFB74D;--warn-d:rgba(255,183,77,.14);
  --ok:#69F0AE;--ok-d:rgba(105,240,174,.12);
  --px:#B39DDB;--px-d:rgba(179,157,219,.15);
  --da:#64B5F6;--da-d:rgba(100,181,246,.14);
  --tr:#90A4AE;
  --nav:60px;--hdr:54px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100dvh;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;touch-action:manipulation}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* LAYOUT */
#app{
  padding-top:var(--hdr);
  padding-bottom:calc(var(--nav) + var(--sb) + 12px);
  min-height:100dvh;
}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:calc(var(--hdr) + var(--st));
  padding-top:var(--st);
  background:rgba(13,13,13,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:var(--st) 14px 0;gap:10px;
  height:calc(var(--hdr) + var(--st));
}
#hdr-back{
  width:34px;height:34px;border-radius:50%;
  background:var(--s2);display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;transition:opacity .1s;
}
#hdr-back:active{opacity:.6}
#hdr-title{flex:1;font-size:17px;font-weight:600;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hdr-action{flex-shrink:0;display:flex;gap:8px}
.hdr-btn{
  height:32px;padding:0 12px;border-radius:8px;
  background:var(--s2);border:1px solid var(--bdr);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;
}
.hdr-btn:active{opacity:.7}

/* BOTTOM NAV */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav) + var(--sb));
  padding-bottom:var(--sb);
  background:rgba(13,13,13,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--bdr);
  display:flex;align-items:stretch;
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:10px;font-weight:500;color:var(--txt3);
  cursor:pointer;touch-action:manipulation;transition:color .15s;
}
.ni.on{color:var(--gold)}
.ni.off{opacity:.3;pointer-events:none}
.ni-icon{font-size:21px;line-height:1}

/* VIEW */
.view{padding:14px}

/* FAB */
.fab{
  position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);right:18px;
  width:54px;height:54px;border-radius:27px;
  background:var(--gold);color:#0D0D0D;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:300;
  box-shadow:0 4px 18px rgba(200,169,110,.38);
  z-index:80;transition:transform .12s,opacity .12s;
}
.fab:active{transform:scale(.91);opacity:.9}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:15px;margin-bottom:10px}
.card-tap{cursor:pointer;transition:background .12s}
.card-tap:active{background:var(--s2)}

/* JOB CARD */
.jc{display:flex;align-items:center;gap:13px}
.jc-icon{width:44px;height:44px;border-radius:12px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.jc-info{flex:1;min-width:0}
.jc-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jc-meta{font-size:12px;color:var(--txt2);margin-top:2px}
.jc-arr{color:var(--txt3);font-size:18px}

/* ROOM CARD */
.rc{display:flex;align-items:center;gap:12px}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:600}
.rc-meta{font-size:12px;color:var(--txt2);margin-top:2px}
.badge{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--gold);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge-px{background:var(--px-d);border:1px solid rgba(179,157,219,.3);color:var(--px)}
.badge-da{background:var(--da-d);border:1px solid rgba(100,181,246,.25);color:var(--da)}
.badge-tr{background:rgba(144,164,174,.1);border:1px solid rgba(144,164,174,.2);color:var(--tr)}

/* FIXTURE CARD */
.fc{display:flex;gap:11px;align-items:flex-start}
.fc-qty{width:38px;height:38px;border-radius:10px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:14px;font-weight:600}
.fc-sub{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.45}
.fc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--bdr)}
.tag-px{background:var(--px-d);border-color:rgba(179,157,219,.3);color:var(--px)}
.tag-da{background:var(--da-d);border-color:rgba(100,181,246,.25);color:var(--da)}
.tag-tr{background:rgba(144,164,174,.08);border-color:rgba(144,164,174,.18);color:var(--tr)}
.tag-warn{background:var(--warn-d);border-color:rgba(255,183,77,.3);color:var(--warn)}

/* SECTION LABEL */
.slabel{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--txt3);margin:18px 0 8px;padding:0 2px}
.slabel:first-child{margin-top:0}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.chips-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-scroll::-webkit-scrollbar{display:none}
.chip{
  padding:8px 14px;border-radius:100px;
  border:1.5px solid var(--bdr);background:var(--s2);
  color:var(--txt2);font-size:13px;font-weight:500;
  white-space:nowrap;flex-shrink:0;
  transition:background .1s,border-color .1s,color .1s;
  touch-action:manipulation;
}
.chip:active{opacity:.7}
.chip.on{background:var(--gold);border-color:var(--gold);color:#0D0D0D;font-weight:600}
.chip.dim{opacity:.28;pointer-events:none}
.chip-lg{padding:11px 18px;font-size:14px;border-radius:12px}
.chip-sm{padding:5px 11px;font-size:12px}

/* FORM */
.fsec{margin-bottom:20px}
.flabel{font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--gold-d);color:var(--gold);text-transform:none;letter-spacing:0}
.finput{
  width:100%;background:var(--s2);border:1.5px solid var(--bdr);
  border-radius:12px;padding:12px 14px;font-size:15px;
  transition:border-color .15s;-webkit-appearance:none;
}
.finput:focus{border-color:var(--gold)}
.qty-wrap{display:flex;align-items:center;background:var(--s2);border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden}
.qty-btn{width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold);transition:background .1s}
.qty-btn:active{background:var(--s3)}
.qty-val{flex:1;text-align:center;font-size:24px;font-weight:700}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--s1);border:1px solid var(--bdr);border-radius:12px}
.toggle-info{}
.toggle-lbl{font-size:15px;font-weight:500}
.toggle-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.tog{width:50px;height:30px;border-radius:15px;background:var(--s3);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.tog.on{background:var(--gold)}
.tog::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}

/* OPTIONAL SECTION */
.opt-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--s2);border:1px solid var(--bdr);
  border-radius:12px;margin-bottom:14px;cursor:pointer;
}
.opt-hdr-lbl{font-size:14px;font-weight:500;color:var(--txt2)}
.opt-arr{color:var(--txt3);font-size:14px;transition:transform .2s}
.opt-arr.open{transform:rotate(180deg)}
.opt-body{display:none}
.opt-body.open{display:block}

/* ALERTS */
.alert{padding:11px 13px;border-radius:10px;font-size:13px;line-height:1.4;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start}
.alert-warn{background:var(--warn-d);border:1px solid rgba(255,183,77,.28);color:var(--warn)}
.alert-info{background:var(--da-d);border:1px solid rgba(100,181,246,.22);color:var(--da)}
.alert-ok{background:var(--ok-d);border:1px solid rgba(105,240,174,.22);color:var(--ok)}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty-icon{font-size:46px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:14px;line-height:1.5}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 18px;border-radius:12px;font-size:15px;font-weight:600;transition:opacity .12s,transform .1s;touch-action:manipulation;cursor:pointer}
.btn:active{opacity:.78;transform:scale(.98)}
.btn-gold{background:var(--gold);color:#0D0D0D}
.btn-sec{background:var(--s2);border:1px solid var(--bdr)}
.btn-danger{background:var(--danger-d);border:1px solid rgba(255,82,82,.28);color:var(--danger)}
.btn-full{width:100%}
.btn-row{display:flex;gap:10px}

/* DIVIDER */
.div{height:1px;background:var(--bdr);margin:14px 0}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:13px 10px;text-align:center}
.stat-val{font-size:23px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px}

/* EXPORT BUTTONS */
.xbtn{display:flex;align-items:center;gap:13px;padding:14px;background:var(--s1);border:1px solid var(--bdr);border-radius:14px;margin-bottom:9px;cursor:pointer;transition:background .12s;width:100%;text-align:left}
.xbtn:active{background:var(--s2)}
.xbtn-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.xbtn-info{flex:1}
.xbtn-title{font-size:15px;font-weight:600}
.xbtn-sub{font-size:12px;color:var(--txt2);margin-top:1px}

/* SKU TABLE */
.sku-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sku-tbl th{text-align:left;padding:7px 9px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);border-bottom:1px solid var(--bdr)}
.sku-tbl td{padding:9px 9px;border-bottom:1px solid var(--bdr);vertical-align:top;line-height:1.4}
.sku-tbl tr:last-child td{border-bottom:none}
.sku-code{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--gold)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-end}
.modal{background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--bdr);padding:20px 20px calc(20px + var(--sb));width:100%;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}

/* TOASTS */
#toasts{position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:7px;align-items:center;width:calc(100% - 28px);max-width:380px}
.toast{background:var(--s3);border:1px solid var(--bdr);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.4);animation:tin .18s ease,tout .28s ease 2s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}

/* MISC */
.dmf-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.5}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot-px{background:var(--px)}.dot-da{background:var(--da)}.dot-tr{background:var(--tr)}
.mono{font-family:'SF Mono','Courier New',monospace}
.row{display:flex;align-items:center;gap:8px}
.flex1{flex:1}
.ml-auto{margin-left:auto}
</style>
</head>
<body>
<div id="hdr">
  <button id="hdr-back" style="display:none" onclick="App.back()">‹</button>
  <div id="hdr-title"><span class="dmf-tag">DMF</span> Spec</div>
  <div id="hdr-action"></div>
</div>
<div id="app"></div>
<nav id="nav"></nav>
<div id="toasts"></div>
<input id="file-import" type="file" accept=".json" style="display:none">

// UTILS
// ═══════════════════════════════════════════════════════════════
const U = {
  uuid(){
    return crypto.randomUUID ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
          const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16);
        });
  },
  today(){return new Date().toISOString().split('T')[0]},
  watts(lm){return C.wattage[lm]||0},
  roomWatts(room){return room.fixtures.reduce((s,f)=>s+(f.qty*U.watts(f.lumens)),0)},
  jobWatts(job){return job.rooms.reduce((s,r)=>s+U.roomWatts(r),0)},
  jobFixtureCount(job){return job.rooms.reduce((s,r)=>s+r.fixtures.reduce((ss,f)=>ss+f.qty,0),0)},
  roomFixtureCount(room){return room.fixtures.reduce((s,f)=>s+f.qty,0)},
  cctLabel(k){return C.cct[k]?.l||k},
  dimLabel(k){return C.dim[k]?.l||k},
  productLabel(p){return C.products[p]?.l||p},
  moduleLabel(p,m){return C.products[p]?.modules[m]?.l||m},
  trimLabel(p,mod,shape,tk){
    const t=C.products[p]?.modules[mod]?.trims[shape]?.find(x=>x.k===tk);
    return t?.l||tk;
  },
  trimSKU(p,mod,shape,tk){
    const t=C.products[p]?.modules[mod]?.trims[shape]?.find(x=>x.k===tk);
    return t?.sku||'';
  },
  finishLabel(p,fk){
    const f=C.products[p]?.finishes.find(x=>x.k===fk);
    return f?.l||fk;
  },
  beamLabel(p,mod,shape,bk){
    const b=C.products[p]?.modules[mod]?.beams[shape]?.find(x=>x.k===bk);
    return b?`${b.l} (${b.a})`:(bk||'');
  },
  getHousingSKU(f){
    const prod=C.products[f.product];
    if(!prod)return'';
    const h=prod.housings[f.shape];
    if(!h)return'';
    if(f.construction==='remodel'){
      return f.dimming==='triac' ? (h.remodel?.sku||'') : (h.remodel_d?.sku||h.remodel?.sku||'');
    }
    if(f.construction==='retrofit'){return h.retrofit?.sku||''}
    // NC
    const ncKey=C.ncTypeToHousingKey[f.ncType||'standard']||'new';
    // A2 chicago is handled via ncType
    if(f.product==='A2'&&f.ncType==='chicago')return h.chicago?.sku||'';
    return h[ncKey]?.sku||h.new?.sku||'';
  },
  getHousingLabel(f){
    const prod=C.products[f.product];
    if(!prod)return'';
    const h=prod.housings[f.shape];
    if(!h)return'';
    if(f.construction==='remodel'){
      return f.dimming==='triac' ? (h.remodel?.l||'') : (h.remodel_d?.l||h.remodel?.l||'');
    }
    if(f.construction==='retrofit'){return h.retrofit?.l||''}
    const ncKey=C.ncTypeToHousingKey[f.ncType||'standard']||'new';
    if(f.product==='A2'&&f.ncType==='chicago')return h.chicago?.l||'';
    return h[ncKey]?.l||h.new?.l||'';
  },
  fixtureTitle(f){
    return `${C.products[f.product]?.short||f.product} ${C.products[f.product]?.modules[f.module]?.l||f.module}`;
  },
  fixtureSummary(f){
    const parts=[
      f.shape.charAt(0).toUpperCase()+f.shape.slice(1),
      f.lumens+'lm',
      U.cctLabel(f.cct),
    ];
    if(f.trim)parts.push(U.trimLabel(f.product,f.module,f.shape,f.trim));
    return parts.join(' · ');
  },
  resolveJobDimming(job){
    return job.phasex.enabled ? 'phasex' : (job.defaults.dimming||'dali2');
  },
  resolveRoomDimming(job,room){
    if(room.dimmingOverride)return room.dimmingOverride;
    return U.resolveJobDimming(job);
  },
  clampLumens(product,module,current){
    const valid=C.products[product]?.modules[module]?.lumens||[1000];
    if(valid.includes(current))return current;
    return valid.reduce((prev,cur)=>Math.abs(cur-current)<Math.abs(prev-current)?cur:prev);
  },
  validBeams(product,module,shape){
    return C.products[product]?.modules[module]?.beams[shape]||[];
  },
  validTrims(product,module,shape){
    return C.products[product]?.modules[module]?.trims[shape]||[];
  },
  validFinishes(product){
    return C.products[product]?.finishes||[];
  },
  validDimming(cct){
    return C.cct[cct]?.dim||['phasex','dali2','triac'];
  },
  pxGateways(n){return Math.max(1,Math.ceil(n/64))},
  esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')},
};

function renderHdrAction(){
  const v=S.view;
  if(v==='jobs')return`<button class="hdr-btn" onclick="App.importJSON()">📥 Import</button>`;
  if(v==='job'){
    const j=getJob();if(!j)return'';
    return`<button class="hdr-btn" onclick="App.editJobSettings('${j.id}')">✏️ Edit</button>`;
  }
  if(v==='room'){
    return`<button class="hdr-btn" onclick="App.goReports()">📊</button>`;
  }
  return'';
}

function renderHeader(){
  const v=S.view;
  const back=document.getElementById('hdr-back');
  const title=document.getElementById('hdr-title');
  const action=document.getElementById('hdr-action');
  const showBack=v!=='jobs';
  back.style.display=showBack?'flex':'none';
  if(v==='jobs') title.innerHTML=`<span class="dmf-tag">DMF</span> Spec`;
  else if(v==='job'){const j=getJob();title.textContent=j?.name||'Job';}
  else if(v==='room'){const r=getRoom();title.textContent=r?.name||'Room';}
  else if(v==='fixture') title.textContent=S.form?.id?'Edit Fixture':'Add Fixture';
  else if(v==='reports'){const j=getJob();title.textContent=j?`${j.name} — Report`:'Report';}
  action.innerHTML=renderHdrAction();
}

      const dimBadge=dim?`<span class="badge ${C.dim[dim]?.badge||''}">${U.dimLabel(dim)}</span>`:'';
      return`<div class="card card-tap rc" onclick="App.openRoom('${r.id}')">
        <div class="rc-info">
          <div class="rc-name">${U.esc(r.name)}</div>
          <div class="rc-meta">${fc} fixture${fc!==1?'s':''} · ${w}W</div>
        </div>
        ${dimBadge}
        <div class="jc-arr">›</div>
      </div>`;
    }).join('');
  }

  return`<div class="view">
    <div class="slabel">House Settings</div>
    ${phasexCard}
    ${defCard}
    <div class="slabel">Rooms <span style="font-size:11px;font-weight:400;color:var(--txt3)">${j.rooms.length} total</span></div>
    ${roomsHtml}
    <button class="fab" onclick="App.addRoom()">+</button>
  </div>`;
}

      ].filter(Boolean).join('');
      return`<div class="card card-tap" onclick="App.editFixture('${f.id}')">

// ═══════════════════════════════════════════════════════════════
// HELPERS FOR REPORTS
// ═══════════════════════════════════════════════════════════════
function countPhasexFixtures(j){
  let n=0;
  j.rooms.forEach(r=>r.fixtures.forEach(f=>{if(f.dimming==='phasex')n+=f.qty}));
  return n;
}
function countByProduct(j,p){
  let n=0;
  j.rooms.forEach(r=>r.fixtures.forEach(f=>{if(f.product===p)n+=f.qty}));
  return n;
}
function buildSKUMap(j){
  const map={};
  j.rooms.forEach(r=>r.fixtures.forEach(f=>{
    const hSKU=U.getHousingSKU(f);
    const tSKU=f.trim?U.trimSKU(f.product,f.module,f.shape,f.trim):'';
    const key=`${f.product}|${f.module}|${f.shape}|${f.lumens}|${f.cct}|${f.dimming}|${f.trim||''}|${f.finish}`;
    if(!map[key]){
      map[key]={
        qty:0,
        moduleSKU:`${f.product}${f.module==='downlight'?'D':'A'}-${f.lumens}lm-${U.cctLabel(f.cct)}`,
        desc:`${U.fixtureTitle(f)} ${f.shape} ${U.cctLabel(f.cct)} ${U.dimLabel(f.dimming)}${f.trim?' '+U.trimLabel(f.product,f.module,f.shape,f.trim):''}`,
        housingSKU:hSKU,
        trimSKU:tSKU,
      };
    }
    map[key].qty+=f.qty;
  }));
  return map;
}

// ═══════════════════════════════════════════════════════════════
// FIXTURE FORM CONTROLLER (FF)
// ═══════════════════════════════════════════════════════════════
const FF={
  set(field,val){
    const f=S.form;
    if(!f)return;

    // Special: empty string → null for optional fields
    if((field==='beamSpread'||field==='trim')&&val==='')val=null;

    f[field]=val;

    // Auto-reset cascades
    if(field==='product'){
      // Reset to defaults for new product
      const newProd=C.products[val];
      f.module='downlight'; // always has downlight
      f.lumens=U.clampLumens(val,'downlight',f.lumens);
      f.beamSpread=null;f.trim=null;
      // Reset finish if not valid
      const validF=U.validFinishes(val).map(x=>x.k);
      if(!validF.includes(f.finish))f.finish='white';
      // Reset ncType if not available
      const ncTs=C.ncTypes[val]?.map(x=>x.k)||[];
      if(!ncTs.includes(f.ncType))f.ncType='standard';
    }
    if(field==='module'){
      f.lumens=U.clampLumens(f.product,val,f.lumens);
      f.beamSpread=null;f.trim=null;
    }
    if(field==='shape'){
      const vb=U.validBeams(f.product,f.module,val).map(x=>x.k);
      if(f.beamSpread&&!vb.includes(f.beamSpread))f.beamSpread=null;
      const vt=U.validTrims(f.product,f.module,val).map(x=>x.k);
      if(f.trim&&!vt.includes(f.trim))f.trim=null;
    }
    if(field==='cct'){
      const vd=U.validDimming(val);
      if(!vd.includes(f.dimming))f.dimming=vd[0]||'dali2';
    }

    App.render();
  },
  qty(delta){
    const f=S.form;if(!f)return;
    f.qty=Math.max(1,Math.min(99,f.qty+delta));
    // Just update the display without full re-render for speed
    const el=document.querySelector('.qty-val');
    if(el)el.textContent=f.qty;
  },
  note(v){if(S.form)S.form.notes=v},
  toggleOpt(){S.optOpen=!S.optOpen;App.render()},
  save(){
    const f=S.form;if(!f)return;
    const j=getJob();const r=getRoom();
    if(!j||!r)return;
    const existingIdx=r.fixtures.findIndex(x=>x.id===f.id);
    if(existingIdx>=0){
      r.fixtures[existingIdx]={...f};
    }else{
      if(!f.id)f.id=U.uuid();
      r.fixtures.push({...f});
    }
    j.updatedAt=new Date().toISOString();
    markDirty();save();
    toast('Fixture saved ✓');
    S.view='room';S.form=null;App.render();
  },
  deleteThis(){
    const f=S.form;if(!f||!f.id)return;
    if(!confirm('Delete this fixture?'))return;
    const r=getRoom();if(!r)return;
    r.fixtures=r.fixtures.filter(x=>x.id!==f.id);
    markDirty();save();toast('Fixture deleted');
    S.view='room';S.form=null;App.render();
  },
};

    const el=document.getElementById('app');
    if(S.view==='jobs') el.innerHTML=renderJobs();
    else if(S.view==='job') el.innerHTML=renderJob();

  init(){
    let data=DB.load();
    if(data?.jobs){S.jobs=data.jobs;}
    // Seed Taghavi if not already present
    if(!S.jobs.find(j=>j.id===TAGHAVI_SEED.jobs[0].id)){
      S.jobs.push(...TAGHAVI_SEED.jobs);
      DB.save({v:1,jobs:S.jobs});
    }
    document.getElementById('file-import').addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          if(d.jobs&&Array.isArray(d.jobs)){
            if(confirm(`Import ${d.jobs.length} job(s)? This will ADD to your existing jobs.`)){
              // Merge, avoid duplicate IDs
              const existing=new Set(S.jobs.map(j=>j.id));
              d.jobs.forEach(j=>{if(!existing.has(j.id))S.jobs.push(j)});
              markDirty();save();toast('Imported ✓');App.render();
            }
          } else {
            // Try legacy format migration
            const migrated=tryMigrateLegacy(d);
            if(migrated){
              if(confirm(`Migrate legacy job "${migrated.name}" (${U.jobFixtureCount(migrated)} fixtures)?`)){
                S.jobs.unshift(migrated);markDirty();save();toast('Migrated ✓');App.render();
              }
            } else {
              alert('Unrecognized file format.');
            }
          }
        }catch{alert('Invalid JSON file.');}
      };
      reader.readAsText(file);
      e.target.value='';
    });
    App.render();
  },
};

// LEGACY MIGRATION (dmf_jobs_v2 → dmf_spec_v1)
// ═══════════════════════════════════════════════════════════════
function tryMigrateLegacy(d){
  // Old format: array of jobs with rooms and fixtures using old field names
  if(!d||typeof d!=='object')return null;
  const jobs=Array.isArray(d)?d:[d];
  if(!jobs[0]?.rooms)return null;
  try{
    const j=jobs[0];
    const newJob=DB.newJob(j.name||j.clientName||'Imported Job',j.address||'',j.date||'');
    (j.rooms||[]).forEach(r=>{
      const nr=DB.newRoom(r.name||'Room');
      (r.fixtures||[]).forEach(f=>{
        // Map old size → product
        let product='A4',module='downlight';
        const sz=parseInt(f.size||f.aperture||4);
        if(sz<=2){product='A2';}
        else{product='A4';}
        if(f.module==='adjustable'||f.type==='adjustable')module='adjustable';

        // Map old CCT
        let cct='3000K';
        const oc=String(f.cct||f.colorTemp||'3000K').toLowerCase();
        if(oc.includes('2700'))cct='2700K';
        else if(oc.includes('3500'))cct='3500K';
        else if(oc.includes('4000'))cct='4000K';
        else if(oc.includes('warm'))cct='warm_dim';
        else if(oc.includes('tunable')||oc.includes('tw'))cct='tunable_white';

        // Map old trim
        let trim=null;
        const ot=String(f.trim||f.trimType||'').toLowerCase();
        if(ot.includes('flange')||ot.includes('micro'))trim='mf';
        else if(ot.includes('flangeless'))trim='fl_less';
        else if(ot.includes('wall'))trim='ww_mf';
        else if(ot.includes('pinhole'))trim='pin';
        else if(ot.includes('hyp'))trim='hyp';

        // Map construction
        let construction='new';
        const oc2=String(f.construction||f.installType||'new').toLowerCase();
        if(oc2.includes('remodel')||oc2.includes('remo'))construction='remodel';
        else if(oc2.includes('retrofit'))construction='retrofit';

        // Map finish
        let finish='white';
        const of=String(f.finish||'white').toLowerCase();
        if(of.includes('black'))finish='black';
        else if(of.includes('bronze'))finish='bronze';
        else if(of.includes('brass'))finish='brass';

        // Map lumens
        const validL=C.products[product].modules[module].lumens;
        let lumens=parseInt(f.lumens||f.lm||1000);
        if(!validL.includes(lumens))lumens=U.clampLumens(product,module,lumens);

        const shape=String(f.shape||'round').toLowerCase().includes('square')?'square':'round';

        nr.fixtures.push(DB.newFixture({
          id:f.id||U.uuid(),qty:parseInt(f.qty||f.quantity||1),
          product,module,shape,construction,lumens,cct,
          dimming:'dali2',trim,finish,
          wetLocation:!!(f.wetLocation||f.wet),
          notes:f.notes||'',
        }));
      });
      newJob.rooms.push(nr);
    });
    return newJob;
  }catch(e){console.error('migration',e);return null;}
}

    // Per room tables

      doc.text(r.name,15,y);y+=2;
      const tableRows=r.fixtures.map(f=>[

        f.shape,
        f.lumens+'lm',
        U.cctLabel(f.cct),

        f.trim?U.trimLabel(f.product,f.module,f.shape,f.trim):'—',
        U.finishLabel(f.product,f.finish),
        U.getHousingSKU(f)||'—',
        f.notes?f.notes.slice(0,30):'',
      ]);
      doc.autoTable({
        startY:y,
        head:[['Qty','Product','Shape','Lumens','CCT','Dimming','Trim','Finish','Housing','Notes']],
        body:tableRows,
        theme:'grid',
        headStyles:{fillColor:dark,textColor:gold,fontSize:8,fontStyle:'bold'},
        bodyStyles:{fontSize:8,textColor:dark},
        alternateRowStyles:{fillColor:[245,245,245]},
        columnStyles:{0:{cellWidth:10},8:{cellWidth:22}},
        margin:{left:15,right:15},
      });
      y=doc.lastAutoTable.finalY+8;
    });

    // SKU Summary
    if(y>240){doc.addPage();y=20;}
    doc.setTextColor(...gold);doc.setFontSize(11);doc.setFont(undefined,'bold');
    doc.text('SKU Summary',15,y);y+=2;
    const skuMap=buildSKUMap(j);
    const skuRows=Object.values(skuMap).map(g=>[g.qty,g.moduleSKU,g.housingSKU,g.trimSKU||'—',g.desc]);
    doc.autoTable({
      startY:y,
      head:[['Qty','Module SKU','Housing SKU','Trim SKU','Description']],
      body:skuRows,
      theme:'grid',
      headStyles:{fillColor:dark,textColor:gold,fontSize:8,fontStyle:'bold'},
      bodyStyles:{fontSize:8,textColor:dark},
      margin:{left:15,right:15},
    });

    doc.save(`DMF-Spec-${(j.name||'job').replace(/\s+/g,'_')}-${U.today()}.pdf`);
    toast('PDF exported ✓');
  },
};

// CHIP HELPER — handle dynamic onclick binding for chips-scroll
// ═══════════════════════════════════════════════════════════════
// The chipsScroll function uses a bound function reference string.
// We fix it to use proper onclick strings instead.
// Override chipsScroll to use correct onclick format:
function chipsScroll(items,selected,fnStr){
  // fnStr is like 'FF.set.bind(null,"cct")' — we simplify to direct call
  const field=fnStr.match(/"([^"]+)"/)?.[1]||'unknown';
  return`<div class="chips-scroll">${items.map(it=>`<button class="chip ${it.k===selected?'on':''}" onclick="FF.set('${field}','${it.k}')">${U.esc(it.l||it.k)}</button>`).join('')}</div>`;
}
