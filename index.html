<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0D0D0D">
<title>DMF Spec</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══ THEME VARS ═══════════════════════════════════════════════════ */
:root{
  --gold:#C8A96E;--gold-d:rgba(200,169,110,.18);--gold-b:rgba(200,169,110,.38);
  --danger:#FF5252;--danger-d:rgba(255,82,82,.14);
  --ok:#4CAF50;--ok-d:rgba(76,175,80,.13);
  --warn:#FF9800;--warn-d:rgba(255,152,0,.13);
  --px:#9575CD;--px-d:rgba(149,117,205,.15);
  --da:#42A5F5;--da-d:rgba(66,165,245,.14);
  --tr:#78909C;
  --nav:58px;--hdr:54px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --trans:background .2s,color .2s,border-color .2s;
}
:root,[data-theme="dark"]{
  --bg:#0D0D0D;--s1:#181818;--s2:#222;--s3:#2A2A2A;
  --txt:#fff;--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.28);
  --bdr:rgba(255,255,255,.08);--hdr-bg:rgba(13,13,13,.94);
  --chip:#222;--inp:#222;--tog-off:#333;
  --card-shadow:none;--ver-bg:#1a2e1a;--ver-col:#66BB6A;
  --rev-bg:#2e2010;--rev-col:#FFA726;
}
[data-theme="light"]{
  --bg:#F4F3F1;--s1:#FFFFFF;--s2:#F0EFEB;--s3:#E8E6E1;
  --txt:#1A1A1A;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.35);
  --bdr:rgba(0,0,0,.09);--hdr-bg:rgba(244,243,241,.95);
  --chip:#ECEAE5;--inp:#FAFAFA;--tog-off:#CCC;
  --card-shadow:0 1px 3px rgba(0,0,0,.07);
  --gold:#9A7230;--gold-d:rgba(154,114,48,.14);--gold-b:rgba(154,114,48,.4);
  --ver-bg:#E8F5E9;--ver-col:#2E7D32;
  --rev-bg:#FFF3E0;--rev-col:#E65100;
  --danger:#C62828;--danger-d:rgba(198,40,40,.1);
  --ok:#2E7D32;--ok-d:rgba(46,125,50,.1);
  --px:#4527A0;--px-d:rgba(69,39,160,.1);
  --da:#1565C0;--da-d:rgba(21,101,192,.1);
}
@media(prefers-color-scheme:light){:root:not([data-theme]){
  --bg:#F4F3F1;--s1:#FFFFFF;--s2:#F0EFEB;--s3:#E8E6E1;
  --txt:#1A1A1A;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.35);
  --bdr:rgba(0,0,0,.09);--hdr-bg:rgba(244,243,241,.95);
  --chip:#ECEAE5;--inp:#FAFAFA;--tog-off:#CCC;
  --card-shadow:0 1px 3px rgba(0,0,0,.07);
  --gold:#9A7230;--gold-d:rgba(154,114,48,.14);--gold-b:rgba(154,114,48,.4);
  --ver-bg:#E8F5E9;--ver-col:#2E7D32;
  --rev-bg:#FFF3E0;--rev-col:#E65100;
  --danger:#C62828;--danger-d:rgba(198,40,40,.1);
  --ok:#2E7D32;--ok-d:rgba(46,125,50,.1);
  --px:#4527A0;--px-d:rgba(69,39,160,.1);
  --da:#1565C0;--da-d:rgba(21,101,192,.1);
}}
/* ═══ RESET ════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;transition:var(--trans)}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;touch-action:manipulation}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}
/* ═══ LAYOUT ════════════════════════════════════════════════════════ */
#app{padding-top:var(--hdr);padding-bottom:calc(var(--nav) + var(--sb) + 12px);min-height:100dvh}
@media(min-width:720px){.view{max-width:680px;margin:0 auto}}
/* ═══ HEADER ════════════════════════════════════════════════════════ */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--hdr) + var(--st));padding-top:var(--st);background:var(--hdr-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding-left:14px;padding-right:14px;gap:10px}
#hdr-back{width:34px;height:34px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:opacity .1s}
#hdr-back:active{opacity:.6}
#hdr-title{flex:1;font-size:17px;font-weight:600;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hdr-right{flex-shrink:0;display:flex;gap:8px;align-items:center}
.hdr-btn{height:32px;padding:0 11px;border-radius:8px;background:var(--s2);border:1px solid var(--bdr);font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hdr-btn:active{opacity:.7}
/* ═══ NAV ═══════════════════════════════════════════════════════════ */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--nav) + var(--sb));padding-bottom:var(--sb);background:var(--hdr-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--bdr);display:flex}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:500;color:var(--txt3);cursor:pointer;touch-action:manipulation;transition:color .15s}
.ni.on{color:var(--gold)}.ni.off{opacity:.28;pointer-events:none}
.ni-icon{font-size:22px;line-height:1}
/* ═══ VIEW ══════════════════════════════════════════════════════════ */
.view{padding:14px}
/* ═══ FAB ═══════════════════════════════════════════════════════════ */
.fab{position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);right:18px;width:54px;height:54px;border-radius:27px;background:var(--gold);color:#0D0D0D;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 18px rgba(200,169,110,.38);z-index:80;transition:transform .12s,opacity .12s}
.fab:active{transform:scale(.91);opacity:.9}
/* ═══ CARDS ═════════════════════════════════════════════════════════ */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--card-shadow)}
.card-tap{cursor:pointer;transition:background .12s}.card-tap:active{background:var(--s2)}
/* ═══ CHIPS ═════════════════════════════════════════════════════════ */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.chips-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-scroll::-webkit-scrollbar{display:none}
.chip{padding:7px 13px;border-radius:100px;border:1.5px solid var(--bdr);background:var(--chip);color:var(--txt2);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .1s;touch-action:manipulation}
.chip:active{opacity:.7}
.chip.on{background:var(--gold);border-color:var(--gold);color:#0D0D0D;font-weight:600}
.chip.dim{opacity:.25;pointer-events:none;text-decoration:line-through}
.chip-lg{padding:10px 16px;font-size:14px;border-radius:12px;text-align:center;line-height:1.3}
/* ═══ FORM ══════════════════════════════════════════════════════════ */
.fsec{margin-bottom:18px}
.flabel{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.fbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--gold-d);color:var(--gold);text-transform:none;letter-spacing:0}
.finput{width:100%;background:var(--inp);border:1.5px solid var(--bdr);border-radius:11px;padding:11px 13px;font-size:15px;transition:border-color .15s;-webkit-appearance:none}
.finput:focus{border-color:var(--gold)}
.qty-wrap{display:flex;align-items:center;background:var(--inp);border:1.5px solid var(--bdr);border-radius:11px;overflow:hidden}
.qty-btn{width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold);transition:background .1s}
.qty-btn:active{background:var(--s3)}
.qty-val{flex:1;text-align:center;font-size:24px;font-weight:700}
/* ═══ ACCORDION ════════════════════════════════════════════════════ */
.acc{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;margin-bottom:9px;overflow:hidden;box-shadow:var(--card-shadow)}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;transition:background .12s}
.acc-hdr:active{background:var(--s2)}
.acc-hdr-left{display:flex;align-items:center;gap:8px}
.acc-label{font-size:14px;font-weight:600}
.acc-status{font-size:11px;color:var(--txt3)}
.acc-arr{color:var(--txt3);font-size:12px;transition:transform .2s;flex-shrink:0}
.acc-arr.open{transform:rotate(180deg)}
.acc-body{display:none;padding:0 14px 14px}
.acc-body.open{display:block}
/* ═══ STATUS FLAGS ══════════════════════════════════════════════════ */
.flag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.flag-v{background:var(--ver-bg);color:var(--ver-col)}
.flag-r{background:var(--rev-bg);color:var(--rev-col)}
.kit-status{display:flex;align-items:center;gap:6px;padding:8px 11px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:10px}
.kit-status.v{background:var(--ver-bg);color:var(--ver-col)}
.kit-status.r{background:var(--rev-bg);color:var(--rev-col)}
/* ═══ BOM LINES ════════════════════════════════════════════════════ */
.bom{font-size:12px}
.bom-line{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.bom-line:last-child{border-bottom:none}
.bom-sku{font-family:'SF Mono','Courier New',monospace;font-weight:700;font-size:11px;color:var(--gold);flex-shrink:0;min-width:120px}
.bom-desc{flex:1;color:var(--txt2);line-height:1.35}
.bom-role{font-size:10px;color:var(--txt3);flex-shrink:0}
/* ═══ SPEC LINKS ════════════════════════════════════════════════════ */
.spec-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.spec-link{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:var(--s2);border:1px solid var(--bdr);color:var(--txt2);text-decoration:none}
.spec-link:active{opacity:.7}
/* ═══ LOAD ══════════════════════════════════════════════════════════ */
.load-line{font-size:12px;color:var(--txt2);margin-top:7px;padding-top:7px;border-top:1px dashed var(--bdr)}
/* ═══ EXISTING CONDITIONS ═══════════════════════════════════════════ */
.existing-section{border:1px dashed var(--bdr);border-radius:12px;padding:11px;margin-bottom:10px;background:var(--s1)}
.existing-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.existing-title{font-size:12px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.existing-row{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.existing-row input,.existing-row select{font:inherit;color:var(--txt);background:var(--inp);border:1px solid var(--bdr);border-radius:8px;padding:6px 8px;font-size:13px;-webkit-appearance:none}
.existing-row input[type=number]{width:52px;text-align:center}
.existing-row .ex-note{flex:1;min-width:100px}
.recon{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:9px;margin-bottom:10px;font-size:12px;font-weight:600}
.recon.open{background:var(--rev-bg);color:var(--rev-col)}
.recon.ok{background:var(--ver-bg);color:var(--ver-col)}
/* ═══ CCT SWATCHES ══════════════════════════════════════════════════ */
.cct-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;border:1.5px solid var(--bdr);background:var(--chip);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .1s}
.cct-chip.on{border-color:var(--gold);background:var(--gold-d)}
.cct-chip.dim{opacity:.25;pointer-events:none;text-decoration:line-through}
.cct-swatch{width:13px;height:13px;border-radius:50%;border:1px solid rgba(128,128,128,.3);flex-shrink:0}
.cct-hint{font-size:11px;color:var(--txt3);margin-top:5px;line-height:1.4}
/* ═══ GROUP CARD ════════════════════════════════════════════════════ */
.gc{display:flex;align-items:flex-start;gap:11px}
.gc-qty{width:38px;height:38px;border-radius:10px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}
.gc-body{flex:1;min-width:0}
.gc-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-sub{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4}
.gc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--bdr)}
.tag-px{background:var(--px-d);border-color:rgba(149,117,205,.3);color:var(--px)}
.tag-da{background:var(--da-d);border-color:rgba(66,165,245,.25);color:var(--da)}
.tag-tr{background:rgba(120,144,156,.1);border-color:rgba(120,144,156,.2);color:var(--tr)}
/* ═══ TOGGLE ════════════════════════════════════════════════════════ */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:11px}
.tog-lbl{font-size:15px;font-weight:500}
.tog-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.tog{width:50px;height:30px;border-radius:15px;background:var(--tog-off);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.tog.on{background:var(--gold)}
.tog::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}
/* ═══ ALERTS ════════════════════════════════════════════════════════ */
.alert{padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.4;margin-bottom:11px;display:flex;gap:9px;align-items:flex-start}
.alert-warn{background:var(--warn-d);border:1px solid rgba(255,152,0,.28);color:var(--warn)}
.alert-info{background:var(--da-d);border:1px solid rgba(66,165,245,.22);color:var(--da)}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
/* ═══ BUTTONS ═══════════════════════════════════════════════════════ */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:12px;font-size:15px;font-weight:600;transition:opacity .12s,transform .1s;touch-action:manipulation;cursor:pointer}
.btn:active{opacity:.78;transform:scale(.98)}
.btn-gold{background:var(--gold);color:#0D0D0D}
.btn-sec{background:var(--s2);border:1px solid var(--bdr)}
.btn-danger{background:var(--danger-d);border:1px solid rgba(255,82,82,.28);color:var(--danger)}
.btn-full{width:100%}
.btn-row{display:flex;gap:9px}
/* ═══ STATS ═════════════════════════════════════════════════════════ */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px}
.stat{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:var(--card-shadow)}
.stat-val{font-size:22px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px}
/* ═══ MISC ══════════════════════════════════════════════════════════ */
.slabel{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--txt3);margin:18px 0 8px;padding:0 2px}
.slabel:first-child{margin-top:0}
.div{height:1px;background:var(--bdr);margin:13px 0}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-icon{font-size:44px;margin-bottom:11px}
.empty-title{font-size:17px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:14px;line-height:1.5}
.mono{font-family:'SF Mono','Courier New',monospace}
.row{display:flex;align-items:center;gap:8px}
.flex1{flex:1}.ml-auto{margin-left:auto}
#toasts{position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:7px;align-items:center;width:calc(100% - 28px);max-width:380px}
.toast{background:var(--s3);border:1px solid var(--bdr);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.35);animation:tin .18s ease,tout .28s ease 2.2s forwards}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-end}
.modal{background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--bdr);padding:20px 20px calc(20px + var(--sb));width:100%;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:13px}
.xbtn{display:flex;align-items:center;gap:12px;padding:13px;background:var(--s1);border:1px solid var(--bdr);border-radius:13px;margin-bottom:9px;cursor:pointer;transition:background .12s;width:100%;text-align:left;box-shadow:var(--card-shadow)}
.xbtn:active{background:var(--s2)}
.xbtn-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.xbtn-title{font-size:14px;font-weight:600}.xbtn-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.sku-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sku-tbl th{text-align:left;padding:6px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);border-bottom:1px solid var(--bdr)}
.sku-tbl td{padding:8px 8px;border-bottom:1px solid var(--bdr);vertical-align:top}
.sku-tbl tr:last-child td{border-bottom:none}
.sku-code{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--gold)}
.dmf-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.6}
</style>
</head>
<body>
<div id="hdr">
  <button id="hdr-back" style="display:none" onclick="App.back()">‹</button>
  <div id="hdr-title"><span class="dmf-tag">DMF</span> Spec</div>
  <div id="hdr-right"></div>
</div>
<div id="app"></div>
<nav id="nav"></nav>
<div id="toasts"></div>
<input id="file-import" type="file" accept=".json" style="display:none">

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════
   PRODUCT CONFIG — SOURCE OF TRUTH
   ═══════════════════════════════════════════════════════════════════ */
const CCT_META={
  '27':{l:'2700K',col:'#ffb265',desc:'Warm / cozy — bedrooms, living rooms, dining.'},
  '30':{l:'3000K',col:'#ffca8c',desc:'Warm white — the go-to for most residential spaces.'},
  '35':{l:'3500K',col:'#ffe0b4',desc:'Neutral white — kitchens, baths, work areas.'},
  '40':{l:'4000K',col:'#f0e6c8',desc:'Cool / crisp — task lighting, garages, display.'},
  '3W':{l:'Warm Dim',col:'linear-gradient(90deg,#ff8a3d,#ffca8c)',desc:'Warms as it dims, 3000K→1800K (candle-like at low end).'},
  'T1':{l:'Tunable White',col:'linear-gradient(90deg,#ff9d4d,#ffe6c4,#dcebff)',desc:'Adjustable 1800K–4000K on demand (requires DALI-2 or PhaseX).'},
};
const LUM_CODES={'07':750,'10':1000,'12':1250,'15':1500};

function Cd(g){return g.product==='A2'?C2:C4;}

/* ═══════════════════════════════════════════════════════════════════
   CONSTRAINT FUNCTIONS
   ═══════════════════════════════════════════════════════════════════ */
function housingAvail(g){
  return Cd(g).housings.filter(h=>h.sh.includes(g.shape||'R'));
}
function ratingAvail(g){
  const h=Cd(g).housings.find(x=>x.c===g.install);
  return h?.rt||[];
}
function lumensAvail(g){
  return Cd(g).lumens.filter(o=>{
    if(g.module==='A'&&(o.c==='12'||o.c==='15'))return false;
    const h=Cd(g).housings.find(x=>x.c===g.install);
    if(h?.lumMax&&(o.c==='12'||o.c==='15'))return false;
    if((g.cct==='3W'||g.cct==='T1')&&o.c!=='10')return false;
    return true;
  });
}
function cctAvail(g){
  return Object.entries(CCT_META).map(([c,m])=>{
    let ok=true;
    if((c==='3W'||c==='T1')){
      if(g.lumens&&g.lumens!=='10')ok=false;
      if(g.dim==='T')ok=false; // TRIAC can't do WD/TW
    }
    return{c,l:m.l,ok};
  }).filter(x=>x.ok).map(x=>({c:x.c,l:x.l}));
}
function beamAvail(g){
  const list=g.module==='A'?Cd(g).beamsA:Cd(g).beamsD;
  return list;
}
function dimAvail(g){
  const all=[{c:'T',l:'TRIAC/ELV'},{c:'D',l:'DALI-2'},{c:'X',l:'PhaseX'}];
  return all.filter(o=>{
    const h=Cd(g).housings.find(x=>x.c===g.install);
    if(o.c==='D'&&h?.noDali)return false;
    if(o.c==='T'&&(g.cct==='3W'||g.cct==='T1'))return false; // WD/TW need digital
    return true;
  });
}
function trimStyleAvail(g){
  return Cd(g).trimStyles[(g.shape||'R')+'_'+(g.module||'D')]||[];
}
function trimFinAvail(g){
  return Cd(g).trimFinish.filter(o=>{
    if(o.prem&&g.trimStyle!=='S')return false;
    return true;
  });
}
function trimOptAvail(g){
  const D=Cd(g);
  return D.trimOptions.filter(o=>{
    if(o.dec&&g.trimStyle!=='S')return false;
    if(o.round&&g.shape!=='R')return false;
    if(o.square&&g.shape!=='S')return false;
    if(o.hypOnly&&g.trimStyle!=='H')return false;
    if(o.noRemodel&&g.app==='remodel')return false;
    if(g.product==='A2'&&o.c==='MF'&&g.trimStyle==='H')return false;
    return true;
  });
}

function normalize(g){
  if(!['R','S'].includes(g.shape))g.shape='R';
  if(!['new','remodel','retro'].includes(g.app))g.app='new';
  if(!['D','A'].includes(g.module))g.module='D';
  const vh=housingAvail(g).map(h=>h.c);
  if(!vh.includes(g.install))g.install=vh[0]||'NC';
  const vrt=ratingAvail(g);
  if(vrt.length){if(!vrt.includes(g.rating))g.rating=vrt[0];}else g.rating='';
  const vl=lumensAvail(g).map(x=>x.c);
  if(!vl.includes(g.lumens))g.lumens=vl.includes('10')?'10':(vl[0]||'10');
  const vc=cctAvail(g).map(x=>x.c);
  if(!vc.includes(g.cct))g.cct=vc.includes('30')?'30':(vc[0]||'30');
  const vd=dimAvail(g).map(x=>x.c);
  if(!vd.includes(g.dim))g.dim=vd[0]||'T';
  const vb=beamAvail(g).map(x=>x.c);
  if(!vb.includes(g.beam))g.beam=vb.includes('NS')?'NS':(vb[0]||'NS');
  const vts=trimStyleAvail(g).map(x=>x.c);
  if(!vts.includes(g.trimStyle))g.trimStyle=vts[0]||'S';
  const vtf=trimFinAvail(g).map(x=>x.c);
  if(!vtf.includes(g.trimFin))g.trimFin='WH';
  const vto=trimOptAvail(g).map(x=>x.c);
  if(!vto.includes(g.trimOpt||''))g.trimOpt=vto[0]||'';
  // A2 has no module finish
  if(g.product==='A2')g.mFin='';
}

/* ═══════════════════════════════════════════════════════════════════
   SKU BUILDERS — REAL CATALOG PART NUMBERS
   ═══════════════════════════════════════════════════════════════════ */
function skuModule(g){
  if(!g.module||!g.lumens||!g.cct||!g.beam||!g.dim)return null;
  if(g.product==='A2')return`ART2${g.module}${g.lumens}T${g.cct}${g.beam}${g.dim}`;
  return`ART4${g.module}${g.lumens}T${g.cct}${g.beam}${g.mFin||''}${g.dim}`;
}
function skuHousing(g){
  if(g.app==='retro')return null;
  if(g.product==='A2'){
    let inst=g.install;
    if(inst==='RM')inst=(g.dim==='D'||g.dim==='X')?'RD':'RM';
    return`X2${inst}${g.shape}`;
  }
  const h=C4.housings.find(x=>x.c===g.install);
  if(!h)return null;
  if(h.special)return'M4CC';
  if(!g.rating)return null;
  return`M4${g.install}${g.shape}${g.rating}`;
}
function skuTrim(g){
  if(!g.shape||!g.trimStyle||!g.trimFin)return null;
  if(g.app==='retro'&&g.product==='A4')return null;
  if(g.product==='A2')return`X2T${g.shape}${g.module}${g.trimStyle}${g.trimFin}${g.trimOpt||''}`;
  return`M4T${g.shape}${g.trimStyle}${g.trimFin}${g.trimOpt||''}`;
}
function skuRetrofitTrim(g){
  if(!g.rAper||!g.rStyle||!g.rFin)return null;
  return`DRD2TR${g.rAper}${g.rStyle}${g.rFin}`;
}
function skuAdapter(g){
  return g.rAdapter?`DRD2X-QCM-${g.rAdapter}`:null;
}
function skuConversionKit(g){
  if(g.product==='A2'){
    return g.rAper==='45'?'X2KRRETRO45':(g.shape==='S'?'X2KSRETRO6':'X2KRRETRO6');
  }
  return g.shape==='S'?'M4KSRETRO6':'M4KRRETRO6';
}
function isTrimVerified(g){
  const D=Cd(g);
  const fin=D.trimFinish.find(x=>x.c===g.trimFin);
  return fin?fin.v:false;
}
function groupBOM(g){
  const lines=[];
  const hv=skuHousing(g);
  if(hv)lines.push({sku:hv,role:'Housing',desc:descHousing(g),v:true,auto:false});
  const mv=skuModule(g);
  if(mv)lines.push({sku:mv,role:'Module',desc:descModule(g),v:true,auto:false});
  if(g.app==='retro'&&g.product==='A4'){
    const rt=skuRetrofitTrim(g);
    if(rt)lines.push({sku:rt,role:'Trim',desc:descRetroTrim(g),v:true,auto:false});
    const ad=skuAdapter(g);
    if(ad)lines.push({sku:ad,role:'Adapter',desc:`${C4.rAdapter.find(x=>x.c===g.rAdapter)?.l||'Adapter'}`,v:true,auto:false});
  } else if(g.app==='retro'&&g.product==='A2'){
    const tv=skuTrim(g);
    if(tv)lines.push({sku:tv,role:'Trim',desc:descTrim(g),v:isTrimVerified(g),auto:false});
    lines.push({sku:skuConversionKit(g),role:'Accessory',desc:`${g.rAper==='45'?'4"/5"':'6"'}→2" Conversion Kit`,v:true,auto:true});
  } else {
    const tv=skuTrim(g);
    if(tv)lines.push({sku:tv,role:'Trim',desc:descTrim(g),v:isTrimVerified(g),auto:false});
    if(g.trimOpt==='FL'){
      lines.push({sku:g.shape==='S'?(g.product==='A2'?'X2KSMUD':'M4XSMUD'):(g.product==='A2'?'X2KRMUD':'M4XRMUD'),role:'Accessory',desc:'Flangeless Mud Plate (drywall)',v:true,auto:true});
    }
    if(g.trimOpt==='MF'&&g.product==='A2'){
      lines.push({sku:'X2CRPRECISION',role:'Accessory',desc:'Precision Lock Collar (included)',v:true,auto:true});
    }
    if(g.from6&&g.product==='A4'){
      lines.push({sku:g.shape==='S'?'M4KSRETRO6':'M4KRRETRO6',role:'Accessory',desc:'6"→4" Conversion Kit',v:true,auto:true});
    }
  }
  return lines;
}
function groupStatus(g){
  const bom=groupBOM(g);
  const needed=g.app==='retro'?['Module','Trim']:['Housing','Module','Trim'];
  const have=new Set(bom.filter(l=>l.sku).map(l=>l.role));
  const missing=needed.filter(r=>!have.has(r));
  const unverified=bom.filter(l=>!l.v).length;
  if(missing.length)return{ok:false,label:'Incomplete: '+missing.join(', ')};
  if(unverified)return{ok:false,label:'Verify finish code before quoting'};
  return{ok:true,label:'Verified - OK to quote'};
}
function groupWatts(g){
  let w=LUM_W[g.lumens]||0;
  if(g.lumens==='10'&&(g.dim==='D'||g.dim==='X'))w=14.5;
  return w;
}
function specUrl(g){
  const px=g.dim==='X';
  const key=(px?'PX':'')+g.shape+(g.module||'D');
  return SPEC_URLS[g.product]?.[key]||null;
}

/* ═══════════════════════════════════════════════════════════════════
   DESCRIPTION HELPERS
   ═══════════════════════════════════════════════════════════════════ */
function descHousing(g){
  if(g.product==='A2'){
    const inst={NC:'NC',CP:'Chicago Plenum',RM:'Remodel',RD:'Remodel Digital'}[g.install]||g.install;
    return`${inst} · ${g.shape==='R'?'Round':'Square'}`;
  }
  const h=C4.housings.find(x=>x.c===g.install);
  const rat={S:'Standard',F:'Fire Rated','':''}[g.rating||''];
  return`${h?.l||g.install}${rat?' · '+rat:''} · ${g.shape==='R'?'Round':'Square'}`;
}
function descModule(g){
  const modL=g.module==='D'?'Downlight':'Adjustable';
  const lum=LUM_CODES[g.lumens]||g.lumens;
  const cct=CCT_META[g.cct]?.l||g.cct;
  const beams=(g.module==='A'?Cd(g).beamsA:Cd(g).beamsD);
  const b=beams.find(x=>x.c===g.beam);
  const bLabel=b?`${b.l} (${b.a})`:g.beam;
  const dLabel={T:'TRIAC/ELV',D:'DALI-2',X:'PhaseX'}[g.dim]||g.dim;
  return`${modL} · ${lum}lm · ${cct} · ${bLabel} · ${dLabel}`;
}
function descTrim(g){
  const ts=trimStyleAvail(g).find(x=>x.c===g.trimStyle);
  const tf=Cd(g).trimFinish.find(x=>x.c===g.trimFin);
  const to=Cd(g).trimOptions.find(x=>x.c===(g.trimOpt||''));
  return[ts?.l,tf?.l,to?.l].filter(Boolean).join(' · ');
}
function descRetroTrim(g){
  const a=C4.rAper.find(x=>x.c===g.rAper);
  const s=C4.rStyle.find(x=>x.c===g.rStyle);
  const f=C4.rFin.find(x=>x.c===g.rFin);
  return`${a?.l||g.rAper} ${s?.l||g.rStyle} ${f?.l||g.rFin} Retrofit Trim`;
}
function groupNotes(g){
  const n=[];
  if(g.dim==='X')n.push('PhaseX requires Gateway ART-GWX (1 per ≤64 fixtures) — added at job level in reports.');
  if(g.trimOpt==='FL')n.push(`Flangeless on wood ceiling → use Router Template (${g.shape==='R'?(g.product==='A2'?'X2KRTEMPLATE':'M4KRTEMPLATE'):(g.product==='A2'?'X2KSTEMPLATE':'M4KSTEMPLATE')}) instead of Mud Plate.`);
  if(g.trimOpt==='MF'&&g.product==='A2')n.push('Micro Flange trim includes Precision Lock Collar (bundled — no separate order needed).');
  if(g.dim==='T')n.push('TRIAC/ELV: 120V only. For 277V use DALI-2 or PhaseX module.');
  if(!g.trimFin||g.trimFin==='CC')n.push('Custom Color finish — confirm exact color code with DMF before quoting.');
  return n;
}

/* ═══════════════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════════════ */
const U={
  uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16)})},
  today(){return new Date().toISOString().split('T')[0]},
  fmtW(w){return(Math.round(w*10)/10)+' W'},
  groupTotalW(g){return groupWatts(g)*(g.qty||1)},
  roomWatts(r){return r.groups.reduce((s,g)=>s+U.groupTotalW(g),0)},
  roomFxCount(r){return r.groups.reduce((s,g)=>s+(g.qty||1),0)},
  existCount(r){return(r.existing||[]).reduce((s,x)=>s+(+x.count||0),0)},
  jobWatts(j){return j.rooms.reduce((s,r)=>s+U.roomWatts(r),0)},
  jobFxCount(j){return j.rooms.reduce((s,r)=>s+U.roomFxCount(r),0)},
  countPX(j){let n=0;j.rooms.forEach(r=>r.groups.forEach(g=>{if(g.dim==='X')n+=(g.qty||1)}));return n},
  countByProduct(j,p){let n=0;j.rooms.forEach(r=>r.groups.forEach(g=>{if(g.product===p)n+=(g.qty||1)}));return n},
  esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')},
  dimLabel(d){return{T:'TRIAC/ELV',D:'DALI-2',X:'PhaseX'}[d]||d},
  dimCls(d){return{T:'tag-tr',D:'tag-da',X:'tag-px'}[d]||''},
  roomRecon(r){
    const ex=U.existCount(r);if(!ex)return{state:'none'};
    const pr=U.roomFxCount(r);const gap=ex-pr;const sig=`${ex}/${pr}`;
    if(gap<=0)return{state:'ok',ex,pr,gap};
    if(r.reviewedSig===sig)return{state:'reviewed',ex,pr,gap};
    return{state:'open',ex,pr,gap};
  },
};

/* ═══════════════════════════════════════════════════════════════════
   DATA STORE
   ═══════════════════════════════════════════════════════════════════ */
const KEY='dmf_spec_v2';
const DB={
  load(){try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):null}catch{return null}},
  save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){console.error(e)}},
  newJob(name,address='',date=''){
    return{id:U.uuid(),name,address,date:date||U.today(),notes:'',
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
      phasex:{enabled:false,roomOverrides:{}},
      defaults:{product:'A4',app:'new',shape:'R',install:'NC',rating:'S',from6:false,
        module:'D',lumens:'10',cct:'30',beam:'NS',dim:'T',mFin:'',
        trimStyle:'S',trimFin:'WH',trimOpt:'',rAper:'4',rStyle:'S',rFin:'WH',rAdapter:''},
      rooms:[]};
  },
  newRoom(name){return{id:U.uuid(),name,existing:[],reviewedSig:null,dimmingOverride:null,groups:[]}},
  newGroup(defaults={}){
    return{id:U.uuid(),name:'',qty:1,
      product:'A4',app:'new',shape:'R',install:'NC',rating:'S',from6:false,
      module:'D',lumens:'10',cct:'30',beam:'NS',dim:'T',mFin:'',
      trimStyle:'S',trimFin:'WH',trimOpt:'',
      rAper:'4',rStyle:'S',rFin:'WH',rAdapter:'',
      wetLocation:false,notes:'',...defaults};
  },
};

/* ═══════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════ */
let S={jobs:[],jobId:null,roomId:null,view:'jobs',form:null,formSec:'housing',isNew:true,dirty:false};
function getJob(){return S.jobs.find(j=>j.id===S.jobId)||null}
function getRoom(){return getJob()?.rooms.find(r=>r.id===S.roomId)||null}

function save(){DB.save({v:2,jobs:S.jobs});S.dirty=false}
function markDirty(){S.dirty=true}
document.addEventListener('visibilitychange',save);
window.addEventListener('pagehide',save);
window.addEventListener('beforeunload',save);

function toast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

/* ═══════════════════════════════════════════════════════════════════
   HEADER / NAV
   ═══════════════════════════════════════════════════════════════════ */
function renderHeader(){
  const v=S.view;
  const back=document.getElementById('hdr-back');
  const title=document.getElementById('hdr-title');
  const right=document.getElementById('hdr-right');
  back.style.display=(v!=='jobs')?'flex':'none';
  if(v==='jobs')title.innerHTML='<span class="dmf-tag">DMF</span> Spec';
  else if(v==='job'){const j=getJob();title.textContent=j?.name||'Job';}
  else if(v==='room'){const r=getRoom();title.textContent=r?.name||'Room';}
  else if(v==='group')title.textContent=S.isNew?'Add Group':'Edit Group';
  else if(v==='reports')title.textContent=(getJob()?.name||'Job')+' — Report';
  const theme=document.documentElement.getAttribute('data-theme')||'dark';
  let btns=`<button class="hdr-btn" onclick="App.toggleTheme()" style="padding:0;width:32px;justify-content:center">${theme==='light'?'🌙':'☀️'}</button>`;
  if(v==='jobs')btns+=`<button class="hdr-btn" onclick="App.importJSON()">📥</button>`;
  if(v==='job'){const j=getJob();if(j)btns+=`<button class="hdr-btn" onclick="App.editJobSettings('${j.id}')">✏️</button>`;}
  right.innerHTML=btns;
}
function renderNav(){
  const v=S.view;const hasJob=!!S.jobId;
  document.getElementById('nav').innerHTML=`
    <div class="ni ${v==='jobs'?'on':''}" onclick="App.goJobs()"><div class="ni-icon">🏠</div><div>Jobs</div></div>
    <div class="ni ${(v==='job'||v==='room')?'on':''} ${hasJob?'':'off'}" onclick="App.goJob()"><div class="ni-icon">📋</div><div>Job</div></div>
    <div class="ni ${v==='reports'?'on':''} ${hasJob?'':'off'}" onclick="App.goReports()"><div class="ni-icon">📊</div><div>Reports</div></div>
  `;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: JOBS
   ═══════════════════════════════════════════════════════════════════ */
function renderJobs(){
  if(!S.jobs.length)return`<div class="view"><div class="empty"><div class="empty-icon">💡</div><div class="empty-title">No jobs yet</div><div class="empty-sub">Tap + to start your first job</div></div><button class="fab" onclick="App.addJob()">+</button></div>`;
  const cards=S.jobs.map(j=>{
    const fc=U.jobFxCount(j),w=U.jobWatts(j).toFixed(1),px=U.countPX(j);
    const meta=[j.address,j.date].filter(Boolean).join(' · ');
    return`<div class="card" style="padding:0;overflow:hidden;display:flex;align-items:stretch">
      <div class="card-tap" style="flex:1;display:flex;align-items:center;gap:13px;padding:14px" onclick="App.openJob('${j.id}')">
        <div style="width:42px;height:42px;border-radius:12px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏗️</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${U.esc(j.name)}</div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px">${meta?U.esc(meta)+'<br>':''}<b>${fc}</b> fixtures · <b>${w}W</b>${px?` · <span style="color:var(--px)">${px} PhaseX</span>`:''}</div>
        </div>
      </div>
      <button style="padding:0 14px;border-left:1px solid var(--bdr);color:var(--txt3);font-size:16px;flex-shrink:0" onclick="App.editJobSettings('${j.id}')">✏️</button>
    </div>`;
  }).join('');
  return`<div class="view">${cards}<button class="fab" onclick="App.addJob()">+</button></div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: JOB
   ═══════════════════════════════════════════════════════════════════ */
function renderJob(){
  const j=getJob();if(!j)return`<div class="view"><div class="empty"><div class="empty-title">Not found</div></div></div>`;
  const pxOn=j.phasex.enabled;
  const phasexCard=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:14px;font-weight:600">⚡ PhaseX — House Wide</div><div style="font-size:12px;color:var(--txt2);margin-top:2px">${pxOn?'All rooms default to PhaseX':'Off — per-fixture dimming'}</div></div>
      <button class="tog ${pxOn?'on':''}" onclick="App.togglePhasex()"></button>
    </div>
    ${pxOn?`<div style="margin-top:10px"><button class="hdr-btn" style="font-size:12px" onclick="App.editPhasexOverrides()">Manage room overrides</button></div>`:''}
  </div>`;
  const rooms=j.rooms.length?j.rooms.map(r=>{
    const fc=U.roomFxCount(r),w=U.roomWatts(r).toFixed(1);
    const rc=U.roomRecon(r);
    const reconBadge=rc.state==='open'?`<span class="flag flag-r">⚠ ${rc.gap} gap</span>`:rc.state==='ok'?`<span class="flag flag-v">✓</span>`:'';
    return`<div class="card card-tap" style="padding:0;overflow:hidden" onclick="App.openRoom('${r.id}')">
      <div style="display:flex;align-items:center;gap:11px;padding:13px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:600">${U.esc(r.name)}</div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px">${fc} group${fc!==1?'s':''} · ${w}W${rc.state!=='none'?` · ${U.existCount(r)} existing`:''}</div>
        </div>
        ${reconBadge}
        <div style="color:var(--txt3);font-size:18px">›</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty" style="padding:32px 20px"><div class="empty-icon">🚪</div><div class="empty-title">No rooms</div><div class="empty-sub">Tap + to add a room</div></div>`;
  return`<div class="view">
    <div class="slabel">House Settings</div>${phasexCard}
    <div class="slabel">Rooms <span style="font-size:11px;font-weight:400;color:var(--txt3)">${j.rooms.length}</span></div>
    ${rooms}<button class="fab" onclick="App.addRoom()">+</button>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: ROOM
   ═══════════════════════════════════════════════════════════════════ */
function renderRoom(){
  const j=getJob(),r=getRoom();if(!j||!r)return`<div class="view"><div class="empty"><div class="empty-title">Not found</div></div></div>`;
  // Stats
  const w=U.roomWatts(r).toFixed(1),fc=U.roomFxCount(r);
  const stats=`<div class="stats" style="grid-template-columns:repeat(2,1fr)">
    <div class="stat"><div class="stat-val">${fc}</div><div class="stat-lbl">Fixtures</div></div>
    <div class="stat"><div class="stat-val">${w}W</div><div class="stat-lbl">Load</div></div>
  </div>`;
  // Existing conditions
  const ex=r.existing||[];
  const exRows=ex.map((x,i)=>`<div class="existing-row">
    <input type="number" min="0" value="${x.count||0}" style="width:52px;text-align:center" oninput="App.setExisting('${r.id}',${i},'count',this.value)">
    <select onchange="App.setExisting('${r.id}',${i},'type',this.value)" style="font-size:13px;background:var(--inp);border:1px solid var(--bdr);border-radius:8px;padding:6px;color:var(--txt)">
      ${EXIST_TYPES.map(t=>`<option ${x.type===t?'selected':''}>${U.esc(t)}</option>`).join('')}
    </select>
    <select onchange="App.setExisting('${r.id}',${i},'aper',this.value)" style="font-size:13px;background:var(--inp);border:1px solid var(--bdr);border-radius:8px;padding:6px;width:60px;color:var(--txt)">
      ${EXIST_APERS.map(a=>`<option ${x.aper===a?'selected':''}>${a}</option>`).join('')}
    </select>
    <input placeholder="note (condition, lamp…)" class="finput ex-note" value="${U.esc(x.note||'')}" style="font-size:13px;padding:6px 9px" oninput="App.setExisting('${r.id}',${i},'note',this.value)">
    <button class="btn btn-danger" style="padding:5px 10px;font-size:12px;flex-shrink:0" onclick="App.delExisting('${r.id}',${i})">✕</button>
  </div>`).join('');
  const rc=U.roomRecon(r);
  let reconHtml='';
  if(rc.state==='open'){
    reconHtml=`<div class="recon open"><span>⚠ ${rc.ex} existing · ${fc} proposed · <b>${rc.gap} unaccounted</b></span><button class="hdr-btn" style="font-size:11px" onclick="App.reviewRoom('${r.id}')">Reviewed: intentional</button></div>`;
  }else if(rc.state==='reviewed'){
    reconHtml=`<div class="recon ok">✓ Reviewed — intentional reduction (${rc.ex}→${fc})</div>`;
  }else if(rc.state==='ok'){
    const extra=fc-rc.ex;
    reconHtml=`<div class="recon ok">✓ ${rc.ex} existing · ${fc} proposed${extra>0?' — adding '+extra+' new':' — all accounted'}</div>`;
  }
  const existingSection=`<div class="existing-section">
    <div class="existing-hdr">
      <span class="existing-title">🔎 Existing on site${ex.length?` · ${U.existCount(r)} fixtures`:''}</span>
      <button class="hdr-btn" style="font-size:11px" onclick="App.addExisting('${r.id}')">+ Add</button>
    </div>
    ${!ex.length?`<div style="font-size:12px;color:var(--txt3);margin-top:5px">Log what's currently in the ceiling — type, aperture, count. Optional — for reconciliation only.</div>`:''}
    ${exRows}
  </div>`;
  // Groups
  const groupsHtml=r.groups.length?r.groups.map(g=>{
    const st=groupStatus(g);
    const dLabel=U.dimLabel(g.dim);
    const lum=LUM_CODES[g.lumens]||g.lumens;
    const cct=CCT_META[g.cct]?.l||g.cct;
    const modL=g.module==='D'?'Downlight':'Adjustable';
    const prodL=g.product==='A4'?'Artafex 4':'Artafex 2';
    const gw=U.groupTotalW(g);
    return`<div class="card card-tap" onclick="App.editGroup('${g.id}')">
      <div class="gc">
        <div class="gc-qty">${g.qty}</div>
        <div class="gc-body">
          <div class="gc-name">${U.esc(g.name||'(unnamed group)')}</div>
          <div class="gc-sub">${prodL} ${modL} · ${lum}lm ${cct} · ${U.fmtW(gw)}</div>
          <div class="gc-tags">
            <span class="tag ${U.dimCls(g.dim)}">${dLabel}</span>
            <span class="tag">${g.app==='new'?'NC':g.app==='remodel'?'Remodel':'Retrofit'}</span>
            <span class="flag ${st.ok?'flag-v':'flag-r'}">${st.ok?'✓ Verified':'⚠ Review'}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:7px;margin-top:9px">
        <button class="btn btn-sec" style="padding:5px 11px;font-size:12px" onclick="event.stopPropagation();App.dupGroup('${g.id}')">Duplicate</button>
        <button class="btn btn-danger" style="padding:5px 11px;font-size:12px" onclick="event.stopPropagation();App.delGroup('${g.id}')">Delete</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty" style="padding:28px 20px"><div class="empty-icon">💡</div><div class="empty-title">No groups</div><div class="empty-sub">Tap + to add a lighting group</div></div>`;
  return`<div class="view">
    ${stats}
    ${existingSection}
    ${reconHtml}
    <div class="slabel">Lighting Groups</div>
    ${groupsHtml}
    <button class="btn btn-danger btn-full" style="margin-top:8px" onclick="App.deleteRoom()">Delete Room</button>
    <button class="fab" onclick="App.addGroup()">+</button>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: GROUP FORM
   ═══════════════════════════════════════════════════════════════════ */
function renderAccBody(autoAccs){
  let html='';
  if(autoAccs.length){
    html+='<div style="font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Auto-Added</div>';
    autoAccs.forEach(a=>{
      html+='<div style="display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bdr)">';
      html+='<span class="bom-sku">\u2605 '+U.esc(a.sku)+'</span>';
      html+='<span class="bom-desc">'+U.esc(a.desc)+'</span>';
      html+='<span class="flag flag-v">auto</span></div>';
    });
  }else{
    html='<div style="font-size:13px;color:var(--txt3)">No accessories required for this configuration.</div>';
  }
  html+='<div style="font-size:11px;color:var(--txt3);margin-top:9px">Router Template and Extension Collar available - add manually if needed.</div>';
  return html;
}
function acc(id,label,body,open,statusHint=''){
  return`<div class="acc">
    <div class="acc-hdr" onclick="GF.sec('${id}')">
      <div class="acc-hdr-left">
        <span class="acc-label">${label}</span>
        ${statusHint?`<span class="acc-status">${statusHint}</span>`:''}
      </div>
      <span class="acc-arr ${open?'open':''}">▾</span>
    </div>
    <div class="acc-body ${open?'open':''}">${body}</div>
  </div>`;
}
function chipsRow(items,selected,field,cls=''){
  return`<div class="chips">${items.map(it=>`<button class="chip${cls?' '+cls:''} ${it.c===selected?'on':''}" onclick="GF.set('${field}','${it.c}')">${U.esc(it.l||it.c)}</button>`).join('')}</div>`;
}
function chipsAvail(all,avail,selected,field,cls=''){
  const availSet=new Set(avail.map(x=>x.c));
  return`<div class="chips">${all.map(it=>`<button class="chip${cls?' '+cls:''} ${it.c===selected?'on':''} ${availSet.has(it.c)?'':'dim'}" onclick="GF.set('${field}','${it.c}')">${U.esc(it.l||it.c)}</button>`).join('')}</div>`;
}
function chipsScroll(items,selected,field){
  return`<div class="chips-scroll">${items.map(it=>`<button class="chip ${it.c===selected?'on':''}" onclick="GF.set('${field}','${it.c}')">${U.esc(it.l||it.c)}</button>`).join('')}</div>`;
}

function renderGroupForm(){
  const g=S.form;if(!g)return'';
  normalize(g);
  const sec=S.formSec||'housing';
  const D=Cd(g);
  const vl=lumensAvail(g),vc=cctAvail(g),vd=dimAvail(g),vb=beamAvail(g),vts=trimStyleAvail(g),vtf=trimFinAvail(g),vto=trimOptAvail(g);
  const isRetro=g.app==='retro';
  const dLabel=U.dimLabel(g.dim);
  const lum=LUM_CODES[g.lumens]||g.lumens;

  // Alerts
  let alerts='';
  if(g.cct==='T1'||g.cct==='3W')alerts+=`<div class="alert alert-info"><span class="alert-icon">ℹ️</span><div>${CCT_META[g.cct]?.l} requires <b>DALI-2 or PhaseX</b> — TRIAC removed.</div></div>`;
  if(g.wetLocation&&g.module==='A')alerts+=`<div class="alert alert-warn"><span class="alert-icon">⚠️</span><div>Adjustable module is <b>damp location only</b> — not for direct spray zones (showers). Use Downlight for wet-rated installs.</div></div>`;

  // Housing section
  const rts=ratingAvail(g);
  const housingBody=`
    <div class="fsec"><div class="flabel">Installation Type</div>
      ${chipsScroll(housingAvail(g).map(h=>({c:h.c,l:h.l})),g.install,'install')}
    </div>
    ${rts.length>1?`<div class="fsec"><div class="flabel">Housing Rating</div>${chipsRow(rts.map(c=>({c,l:{S:'Standard',F:'Fire Rated'}[c]||c})),g.rating,'rating')}</div>`:''}
    ${!isRetro&&g.product==='A4'?`<div class="fsec"><div class="flabel">Existing Opening</div><div class="chips">
      <button class="chip ${!g.from6?'on':''}" onclick="GF.set('from6',false)">New / same size</button>
      <button class="chip ${g.from6?'on':''}" onclick="GF.set('from6',true)">From 6" (add conversion kit)</button>
    </div></div>`:''}
    ${isRetro&&g.product==='A2'?`<div class="fsec"><div class="flabel">Existing Aperture</div>${chipsRow(C2.rAper,g.rAper,'rAper')}</div>`:''}
  `;
  const housingHint=isRetro?'Retrofit path':`${g.install} · ${g.shape==='R'?'Round':'Square'}${rts.length?` · ${g.rating==='F'?'Fire Rated':'Standard'}`:''}`;

  // Module section
  const moduleBody=`
    <div class="fsec"><div class="flabel">Module Type</div>
      <div class="chips">${['D','A'].map(m=>`<button class="chip chip-lg ${g.module===m?'on':''}" onclick="GF.set('module','${m}')">${m==='D'?'Downlight':'Adjustable'}<br><span style="font-size:10px;opacity:.7">${m==='D'?'💧 Wet':'◐ Damp'}</span></button>`).join('')}</div>
    </div>
    <div class="fsec"><div class="flabel">Lumens</div>
      <div class="chips">${D.lumens.map(o=>{const valid=vl.some(x=>x.c===o.c);return`<button class="chip chip-lg ${g.lumens===o.c?'on':''} ${valid?'':'dim'}" onclick="GF.set('lumens','${o.c}')">${o.l}<br><span style="font-size:10px;opacity:.7">${LUM_W[o.c]}W</span></button>`;}).join('')}</div>
    </div>
    <div class="fsec"><div class="flabel">Color Temperature</div>
      <div class="chips-scroll">${Object.entries(CCT_META).map(([c,m])=>{const valid=vc.some(x=>x.c===c);return`<button class="cct-chip ${g.cct===c?'on':''} ${valid?'':'dim'}" onclick="GF.set('cct','${c}')"><span class="cct-swatch" style="background:${m.col}"></span>${m.l}</button>`;}).join('')}</div>
      ${CCT_META[g.cct]?`<div class="cct-hint">💡 ${CCT_META[g.cct].desc}</div>`:''}
    </div>
    <div class="fsec"><div class="flabel">Dimming / Control</div>
      <div class="chips">${[{c:'T',l:'TRIAC/ELV'},{c:'D',l:'DALI-2'},{c:'X',l:'PhaseX'}].map(d=>{const valid=vd.some(x=>x.c===d.c);return`<button class="chip ${g.dim===d.c?'on':''} ${valid?'':'dim'}" onclick="GF.set('dim','${d.c}')">${d.l}<br><span style="font-size:10px;opacity:.7">${d.c==='T'?'1% · 120V':'0.1%'}</span></button>`;}).join('')}</div>
    </div>
    <div class="fsec"><div class="flabel">Beam Spread <span class="fbadge">optional</span></div>
      ${chipsScroll([{c:'',l:'Not set'},...vb.map(b=>({c:b.c,l:`${b.l} (${b.a})`}))],g.beam||'','beam')}
    </div>
    ${g.product==='A4'?`<div class="fsec"><div class="flabel">Module Finish</div>
      <div class="chips">${[{c:'',l:'Black (default)'},{c:'W',l:'White'}].map(m=>`<button class="chip ${g.mFin===m.c?'on':''}" onclick="GF.set('mFin','${m.c}')">${m.l}</button>`).join('')}</div>
    </div>`:''}
  `;
  const modHint=`${g.module==='D'?'Downlight':'Adjustable'} · ${lum}lm · ${CCT_META[g.cct]?.l||g.cct} · ${dLabel}`;

  // Trim / Retrofit section
  let trimBody='',trimHint='';
  if(isRetro&&g.product==='A4'){
    trimBody=`
      <div class="fsec"><div class="flabel">Existing Aperture</div>${chipsRow(C4.rAper,g.rAper,'rAper')}</div>
      <div class="fsec"><div class="flabel">Trim Style</div>${chipsRow(C4.rStyle,g.rStyle,'rStyle')}</div>
      <div class="fsec"><div class="flabel">Trim Finish</div>${chipsRow(C4.rFin,g.rFin,'rFin')}</div>
      <div class="fsec"><div class="flabel">Socket Adapter</div>${chipsScroll(C4.rAdapter,g.rAdapter,'rAdapter')}</div>
    `;
    trimHint=`${g.rAper}" ${g.rStyle==='S'?'Smooth':'Baffle'} ${g.rFin}`;
  } else {
    const premFins=vtf.filter(x=>x.prem),stdFins=vtf.filter(x=>!x.prem);
    trimBody=`
      <div class="fsec"><div class="flabel">Trim Style</div>
        ${chipsAvail(vts,vts,g.trimStyle,'trimStyle')}
      </div>
      <div class="fsec"><div class="flabel">Flange / Option</div>
        ${chipsAvail(vto,vto,g.trimOpt||'','trimOpt')}
      </div>
      <div class="fsec"><div class="flabel">Trim Finish</div>
        <div class="chips">${stdFins.map(f=>`<button class="chip ${g.trimFin===f.c?'on':''}" onclick="GF.set('trimFin','${f.c}')">${f.l}</button>`).join('')}</div>
        ${premFins.length?`<div style="font-size:10px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin:7px 0 5px">Premium Metallic (A2 only)</div><div class="chips">${premFins.map(f=>`<button class="chip ${g.trimFin===f.c?'on':''}" style="border-color:var(--gold-b)" onclick="GF.set('trimFin','${f.c}')">${f.l}</button>`).join('')}</div>`:''}

  }

  // Accessories (auto-computed)

  // Notes section

      <textarea class="finput" rows="3" placeholder="e.g. existing 6&quot; MR16 cans, insulated ceiling, paint-over flange…" oninput="GF.note(this.value)" style="resize:none;line-height:1.5">${U.esc(g.notes)}</textarea>
    </div>
  `;

  // In-line kit preview

  const surl=specUrl(g);
  const kitPreview=`
    <div class="kit-status ${st.ok?'v':'r'}">${st.ok?'✓':'⚠'} ${U.esc(st.label)}</div>
    <div class="bom">
      ${bom.map(l=>`<div class="bom-line">
        <span class="bom-sku">${U.esc(l.sku||'—')}</span>
        <span class="bom-desc">${U.esc(l.role)}${l.auto?' · auto':''} — ${U.esc(l.desc)}</span>
        <span class="flag ${l.v?'flag-v':'flag-r'}">${l.v?'✓':'verify'}</span>
      </div>`).join('')}
    </div>
    <div class="load-line">Connected load: <b>${U.fmtW(groupWatts(g))}/fixture</b> · <b>${U.fmtW(U.groupTotalW(g))}</b> for this group (${g.qty}×)</div>
    ${surl?`<div class="spec-links"><a href="${surl}" target="_blank" class="spec-link">📄 Spec sheet ↗</a></div>`:''}
    ${groupNotes(g).map(n=>`<div class="alert alert-warn" style="margin-top:7px"><span class="alert-icon">⚠</span><div style="font-size:12px">${U.esc(n)}</div></div>`).join('')}
  `;

  return`<div class="view">
    ${alerts}
    <div class="fsec">
      <div class="flabel">Group Name <span class="fbadge">optional</span></div>
      <input class="finput" id="group-name-input" placeholder="e.g. General, Bar counter, Art wall…" value="${U.esc(g.name)}" oninput="GF.name(this.value)">
    </div>
    <div class="fsec">
      <div class="flabel">Quantity</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="GF.qty(-1)">−</button>
        <div class="qty-val" id="qty-display">${g.qty}</div>
        <button class="qty-btn" onclick="GF.qty(1)">+</button>
      </div>
    </div>
    <div class="fsec">
      <div class="flabel">Product</div>
      <div class="chips">${['A4','A2'].map(p=>`<button class="chip chip-lg ${g.product===p?'on':''}" onclick="GF.set('product','${p}')">${p==='A4'?'Artafex 4':'Artafex 2'}</button>`).join('')}</div>
    </div>
    <div class="fsec">
      <div class="flabel">Application</div>
      <div class="chips">${[{c:'new',l:'New Construction'},{c:'remodel',l:'Remodel'},{c:'retro',l:'Retrofit'}].map(a=>`<button class="chip ${g.app===a.c?'on':''}" onclick="GF.set('app','${a.c}')">${a.l}</button>`).join('')}</div>
    </div>
    <div class="fsec">
      <div class="flabel">Shape <span class="fbadge">drives housing + trim</span></div>
      <div class="chips">${[{c:'R',l:'Round'},{c:'S',l:'Square'}].map(s=>`<button class="chip chip-lg ${g.shape===s.c?'on':''}" onclick="GF.set('shape','${s.c}')">${s.l}</button>`).join('')}</div>
    </div>
    ${acc('housing','Housings & Conversion Kits',housingBody,sec==='housing',housingHint)}
    ${acc('module','Module',moduleBody,sec==='module',modHint)}
    ${acc('trim',isRetro&&g.product==='A4'?'Retrofit Trim':'Trim',trimBody,sec==='trim',trimHint)}
    ${acc('accessories','Accessories',accBody,sec==='accessories',autoAccs.length?autoAccs.length+' auto-added':'')}

      <button class="btn btn-gold flex1" onclick="GF.save()">Save Group</button>
    </div>
    ${!S.isNew?`<button class="btn btn-danger btn-full" style="margin-top:10px" onclick="GF.deleteThis()">Delete Group</button>`:''}

}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: REPORTS
   ═══════════════════════════════════════════════════════════════════ */
function renderReports(){
  const j=getJob();if(!j)return`<div class="view"><div class="empty"><div class="empty-title">No active job</div></div></div>`;
  const totalFx=U.jobFxCount(j),totalW=U.jobWatts(j),pxFx=U.countPX(j);
  const gateways=pxFx?Math.ceil(pxFx/64):0;
  const a2=U.countByProduct(j,'A2'),a4=U.countByProduct(j,'A4');
  const stats=`<div class="stats">
    <div class="stat"><div class="stat-val">${totalFx}</div><div class="stat-lbl">Fixtures</div></div>
    <div class="stat"><div class="stat-val">${totalW.toFixed(0)}W</div><div class="stat-lbl">Load</div></div>
    <div class="stat"><div class="stat-val">${j.rooms.length}</div><div class="stat-lbl">Rooms</div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val">${a2}</div><div class="stat-lbl">Artafex 2</div></div>
    <div class="stat"><div class="stat-val">${a4}</div><div class="stat-lbl">Artafex 4</div></div>
    <div class="stat"><div class="stat-val">${gateways||'—'}</div><div class="stat-lbl">${gateways?'Gateways':'PhaseX'}</div></div>
  </div>`;

  // Verification summary
  let verCount=0,revCount=0;
  j.rooms.forEach(r=>r.groups.forEach(g=>{groupStatus(g).ok?verCount++:revCount++;}));
  const verBanner=`<div class="kit-status ${revCount?'r':'v'}" style="margin-bottom:12px">${revCount?`⚠ ${revCount} group${revCount>1?'s':''} need review · ${verCount} verified`:`✓ All ${verCount} groups verified — OK to quote`}</div>`;

  // By room
  const roomRows=j.rooms.map(r=>`<div class="card" style="padding:12px 14px;margin-bottom:9px">
    <div class="row"><div style="font-size:14px;font-weight:600">${U.esc(r.name)}</div>
    <div class="ml-auto" style="font-size:12px;color:var(--txt2)">${U.roomFxCount(r)} fx · ${U.fmtW(U.roomWatts(r))}</div></div>
    ${r.groups.map(g=>{const st=groupStatus(g);return`<div style="font-size:12px;color:var(--txt2);margin-top:5px;display:flex;align-items:center;gap:6px">
      <span class="tag ${U.dimCls(g.dim)}" style="font-size:10px">${U.dimLabel(g.dim)}</span>
      ${g.qty}× ${U.esc(g.name||'(group)')} — ${LUM_CODES[g.lumens]}lm ${CCT_META[g.cct]?.l||g.cct}
      <span class="flag ${st.ok?'flag-v':'flag-r'}" style="margin-left:auto">${st.ok?'✓':'⚠'}</span>
    </div>`;}).join('')}
  </div>`).join('');

  // Consolidated buy list
  const buyList=buildBuyList(j);
  const skuRows=buyList.map(g=>`<div class="card" style="padding:11px 13px;margin-bottom:8px">
    <div class="row" style="margin-bottom:7px">
      <div style="font-size:13px;font-weight:600">${g.qty}× ${U.esc(g.desc)}</div>
      <span class="flag ${g.allVerified?'flag-v':'flag-r'} ml-auto">${g.allVerified?'✓ verified':'⚠ verify'}</span>
    </div>
    <div class="bom">
      ${g.components.map(c=>`<div class="bom-line">
        <span class="bom-sku">${c.auto?'★ ':''}<span style="color:var(--gold)">${U.esc(c.sku)}</span></span>
        <span class="bom-desc">${U.esc(c.role)}${c.auto?' · auto':''} — ${U.esc(c.desc)}</span>
        <span class="flag ${c.v?'flag-v':'flag-r'}">${c.v?'✓':'verify'}</span>
      </div>`).join('')}
    </div>
  </div>`).join('');

  const exports=`
    <button class="xbtn" onclick="X.json()"><div class="xbtn-icon" style="background:var(--s2)">📦</div><div><div class="xbtn-title">Export JSON</div><div class="xbtn-sub">Full backup · importable</div></div><div style="color:var(--txt3)">›</div></button>
    <button class="xbtn" onclick="X.excel()"><div class="xbtn-icon" style="background:rgba(76,175,80,.1)">📊</div><div><div class="xbtn-title">Export Excel</div><div class="xbtn-sub">Buy-list + per-room tabs + load summary</div></div><div style="color:var(--txt3)">›</div></button>
  `;

  return`<div class="view">
    ${stats}${verBanner}
    <div class="slabel">By Room</div>${roomRows||''}
    <div class="slabel">Consolidated Buy-List</div>${skuRows||'<div class="card"><div style="color:var(--txt3);text-align:center;padding:12px;font-size:13px">No groups configured</div></div>'}
    <div class="slabel">Export</div>${exports}
  </div>`;
}

function buildBuyList(j){
  const map={};
  let pxCount=0;
  j.rooms.forEach(r=>r.groups.forEach(g=>{
    const qty=g.qty||1;
    if(g.dim==='X')pxCount+=qty;
    const bom=groupBOM(g);
    const key=bom.map(l=>l.sku).join('|');
    const cct=CCT_META[g.cct]?.l||g.cct;
    const lum=LUM_CODES[g.lumens]||g.lumens;
    const modL=g.module==='D'?'Downlight':'Adjustable';
    const desc=`${g.product==='A4'?'Artafex 4':'Artafex 2'} ${modL} ${g.shape==='R'?'Round':'Square'} ${lum}lm ${cct} ${U.dimLabel(g.dim)}`;
    if(!map[key]){map[key]={qty:0,desc,components:bom,allVerified:bom.every(l=>l.v)};}
    map[key].qty+=qty;
  }));
  if(pxCount>0){
    const gw=Math.ceil(pxCount/64);
    map['ART-GWX']={qty:gw,desc:'PhaseX Gateway (≤64 fixtures each)',
      components:[{sku:'ART-GWX',role:'Control',desc:`${gw} gateway${gw>1?'s':''} for ${pxCount} PhaseX fixtures`,v:true,auto:true}],
      allVerified:true};
  }
  return Object.values(map);
}

/* ═══════════════════════════════════════════════════════════════════
   GROUP FORM CONTROLLER (GF)
   ═══════════════════════════════════════════════════════════════════ */
const GF={
  sec(id){S.formSec=S.formSec===id?null:id;App.render()},
  set(field,val){
    const g=S.form;if(!g)return;
    if(field==='beam'&&val==='')val='';
    g[field]=field==='wetLocation'?val:val;
    // Cascade resets
    if(field==='product'){
      g.module='D';
      normalize(g);
    }
    if(field==='shape'){
      if(val==='S'&&['CC','DH'].includes(g.install))g.install='NC';
      normalize(g);
    }
    if(field==='app'){normalize(g);}
    if(field==='module'){normalize(g);}
    if(field==='install'){normalize(g);}
    if(field==='cct'){
      if((val==='3W'||val==='T1')&&g.dim==='T')g.dim='D';
      normalize(g);
    }
    if(field==='trimStyle'){normalize(g);}
    App.render();
  },
  name(v){if(S.form)S.form.name=v},
  note(v){if(S.form)S.form.notes=v},
  qty(delta){
    const g=S.form;if(!g)return;
    g.qty=Math.max(1,Math.min(99,g.qty+delta));
    const el=document.getElementById('qty-display');
    if(el)el.textContent=g.qty;
  },
  save(){
    const g=S.form;if(!g)return;
    normalize(g);
    const j=getJob(),r=getRoom();if(!j||!r)return;
    const idx=r.groups.findIndex(x=>x.id===g.id);
    if(idx>=0)r.groups[idx]={...g};
    else{if(!g.id)g.id=U.uuid();r.groups.push({...g});}
    j.updatedAt=new Date().toISOString();
    markDirty();save();toast('Group saved ✓');
    S.view='room';S.form=null;App.render();
  },
  deleteThis(){
    const g=S.form;if(!g)return;
    if(!confirm('Delete this group?'))return;
    const r=getRoom();if(!r)return;
    r.groups=r.groups.filter(x=>x.id!==g.id);
    markDirty();save();toast('Deleted');
    S.view='room';S.form=null;App.render();
  },
};

/* ═══════════════════════════════════════════════════════════════════
   APP ACTIONS
   ═══════════════════════════════════════════════════════════════════ */
const App={
  render(){
    const el=document.getElementById('app');
    if(S.view==='jobs')el.innerHTML=renderJobs();
    else if(S.view==='job')el.innerHTML=renderJob();
    else if(S.view==='room')el.innerHTML=renderRoom();
    else if(S.view==='group')el.innerHTML=renderGroupForm();
    else if(S.view==='reports')el.innerHTML=renderReports();
    renderHeader();renderNav();
  },
  back(){
    if(S.view==='group'){S.view='room';S.form=null;}
    else if(S.view==='room'){S.view='job';}
    else if(S.view==='job'){S.view='jobs';S.jobId=null;S.roomId=null;}
    else if(S.view==='reports'){S.view='job';}
    App.render();
  },
  goJobs(){S.view='jobs';S.jobId=null;S.roomId=null;App.render()},
  goJob(){if(S.jobId){S.view='job';App.render()}},
  goReports(){if(S.jobId){S.view='reports';App.render()}},
  openJob(id){S.jobId=id;S.view='job';App.render()},
  openRoom(id){S.roomId=id;S.view='room';App.render()},
  addJob(){
    const name=prompt('Client / Job Name:','');if(!name?.trim())return;
    const addr=prompt('Address (optional):','')||'';
    const j=DB.newJob(name.trim(),addr.trim());
    S.jobs.unshift(j);S.jobId=j.id;markDirty();save();S.view='job';App.render();
  },
  editJobSettings(jobId){
    const j=S.jobs.find(x=>x.id===jobId)||getJob();if(!j)return;
    const html=`<div class="modal">
      <div class="modal-title">Edit Job</div>
      <div class="fsec"><div class="flabel">Client / Job Name</div><input class="finput" id="ej-name" type="text" value="${U.esc(j.name)}" placeholder="Client name" autocomplete="off"></div>
      <div class="fsec"><div class="flabel">Address</div><input class="finput" id="ej-addr" type="text" value="${U.esc(j.address||'')}" placeholder="Property address" autocomplete="off"></div>
      <div class="fsec"><div class="flabel">Date</div><input class="finput" id="ej-date" type="date" value="${U.esc(j.date||'')}"></div>
      <div class="fsec"><div class="flabel">Notes <span class="fbadge">optional</span></div><textarea class="finput" id="ej-notes" rows="2" style="resize:none">${U.esc(j.notes||'')}</textarea></div>
      <div class="btn-row" style="margin-top:4px">
        <button class="btn btn-sec flex1" onclick="App.closeModal()">Cancel</button>
        <button class="btn btn-gold flex1" onclick="App.saveJobDetails('${j.id}')">Save</button>
      </div>
      <div class="div"></div>
      <button class="btn btn-danger btn-full" onclick="App.confirmDeleteJob('${j.id}')">Delete Job</button>
    </div>`;
    document.body.insertAdjacentHTML('beforeend',`<div class="modal-bg" id="modal-bg" onclick="if(event.target.id==='modal-bg')App.closeModal()">${html}</div>`);
    setTimeout(()=>document.getElementById('ej-name')?.focus(),100);
  },
  saveJobDetails(jobId){
    const j=S.jobs.find(x=>x.id===jobId);if(!j)return;
    const name=document.getElementById('ej-name')?.value?.trim();
    if(name)j.name=name;
    j.address=document.getElementById('ej-addr')?.value?.trim()||'';
    j.date=document.getElementById('ej-date')?.value?.trim()||'';
    j.notes=document.getElementById('ej-notes')?.value?.trim()||'';
    j.updatedAt=new Date().toISOString();
    markDirty();save();App.closeModal();App.render();toast('Saved ✓');
  },
  confirmDeleteJob(id){
    App.closeModal();
    setTimeout(()=>{
      if(!confirm('Delete this job? This cannot be undone.'))return;
      S.jobs=S.jobs.filter(j=>j.id!==id);
      if(S.jobId===id){S.jobId=null;S.roomId=null;S.view='jobs';}
      markDirty();save();App.render();
    },250);
  },
  closeModal(){document.getElementById('modal-bg')?.remove()},
  addRoom(){
    const j=getJob();if(!j)return;
    const name=prompt('Room name:','');if(!name?.trim())return;
    const r=DB.newRoom(name.trim());j.rooms.push(r);S.roomId=r.id;
    markDirty();save();S.view='room';App.render();
  },
  deleteRoom(){
    const j=getJob(),r=getRoom();if(!j||!r)return;
    if(!confirm(`Delete "${r.name}" and all its groups?`))return;
    j.rooms=j.rooms.filter(x=>x.id!==r.id);S.roomId=null;S.view='job';
    markDirty();save();App.render();
  },
  addGroup(){
    const j=getJob(),r=getRoom();if(!j||!r)return;
    const d=j.defaults;
    const dim=j.phasex.enabled?'X':(r.dimmingOverride||d.dim||'T');
    S.form=DB.newGroup({...d,dim});
    normalize(S.form);S.formSec='housing';S.isNew=true;S.view='group';App.render();
  },
  editGroup(id){
    const r=getRoom();if(!r)return;
    const g=r.groups.find(x=>x.id===id);if(!g)return;
    S.form={...g};normalize(S.form);S.formSec='housing';S.isNew=false;S.view='group';App.render();
  },
  dupGroup(id){
    const r=getRoom();if(!r)return;
    const g=r.groups.find(x=>x.id===id);if(!g)return;
    const idx=r.groups.findIndex(x=>x.id===id);
    const c={...g,id:U.uuid(),name:(g.name||'Group')+' (copy)'};
    r.groups.splice(idx+1,0,c);markDirty();save();toast('Duplicated ✓');App.render();
  },
  delGroup(id){
    if(!confirm('Delete this group?'))return;
    const r=getRoom();if(!r)return;
    r.groups=r.groups.filter(x=>x.id!==id);markDirty();save();App.render();
  },
  addExisting(rid){
    const r=getJob()?.rooms.find(x=>x.id===rid);if(!r)return;
    if(!r.existing)r.existing=[];
    r.existing.push({id:U.uuid(),type:EXIST_TYPES[0],aper:'6"',count:1,note:''});
    markDirty();save();App.render();
  },
  setExisting(rid,idx,field,val){
    const r=getJob()?.rooms.find(x=>x.id===rid);if(!r)return;
    const x=r.existing[idx];if(!x)return;
    x[field]=field==='count'?Math.max(0,parseInt(val)||0):val;
    markDirty();save();
    // Update reconciliation display only (no full re-render needed for text fields)
    if(field==='count')App.render();
  },
  delExisting(rid,idx){
    const r=getJob()?.rooms.find(x=>x.id===rid);if(!r)return;
    r.existing.splice(idx,1);markDirty();save();App.render();
  },
  reviewRoom(rid){
    const r=getJob()?.rooms.find(x=>x.id===rid);if(!r)return;
    r.reviewedSig=`${U.existCount(r)}/${U.roomFxCount(r)}`;
    markDirty();save();App.render();
  },
  setRoomDimming(dim){const r=getRoom();if(!r)return;r.dimmingOverride=dim;markDirty();save();App.render()},
  togglePhasex(){
    const j=getJob();if(!j)return;
    j.phasex.enabled=!j.phasex.enabled;
    j.defaults.dim=j.phasex.enabled?'X':'T';
    markDirty();save();App.render();
  },
  editPhasexOverrides(){
    const j=getJob();if(!j)return;
    const html=`<div class="modal">
      <div class="modal-title">Room PhaseX Overrides</div>
      <div style="font-size:13px;color:var(--txt2);margin-bottom:13px">Override dimming for specific rooms. All others use PhaseX.</div>
      ${j.rooms.map(r=>{const cur=j.phasex.roomOverrides?.[r.id]?.dim||'';
        return`<div style="margin-bottom:12px">
          <div style="font-size:14px;font-weight:600;margin-bottom:6px">${U.esc(r.name)}</div>
          <div class="chips">
            <button class="chip chip-sm ${!cur?'on':''}" onclick="App.setRoomPX('${r.id}',null)">PhaseX</button>
            <button class="chip chip-sm ${cur==='D'?'on':''}" onclick="App.setRoomPX('${r.id}','D')">DALI-2</button>
            <button class="chip chip-sm ${cur==='T'?'on':''}" onclick="App.setRoomPX('${r.id}','T')">TRIAC</button>
          </div>
        </div>`;}).join('')}
      <button class="btn btn-gold btn-full" style="margin-top:8px" onclick="App.closeModal()">Done</button>
    </div>`;
    document.body.insertAdjacentHTML('beforeend',`<div class="modal-bg" id="modal-bg" onclick="if(event.target.id==='modal-bg')App.closeModal()">${html}</div>`);
  },
  setRoomPX(rid,dim){
    const j=getJob();if(!j)return;
    if(!j.phasex.roomOverrides)j.phasex.roomOverrides={};
    if(!dim)delete j.phasex.roomOverrides[rid];
    else j.phasex.roomOverrides[rid]={dim};
    markDirty();save();App.closeModal();App.render();
  },
  toggleTheme(){
    const root=document.documentElement;
    const cur=root.getAttribute('data-theme')||'dark';
    const next=cur==='dark'?'light':'dark';
    root.setAttribute('data-theme',next);
    try{localStorage.setItem('dmf-theme',next)}catch{}

  },
  importJSON(){document.getElementById('file-import').click()},
};

/* ═══════════════════════════════════════════════════════════════════
   MIGRATION: v1 → v2
   ═══════════════════════════════════════════════════════════════════ */
function migrateV1Job(j){
  if(!j||!j.rooms)return j;
  j.rooms.forEach(r=>{
    if(!r.existing)r.existing=[];
    if(!r.reviewedSig)r.reviewedSig=null;
    if(!r.groups)r.groups=[];
    // Migrate fixtures → groups
    if(r.fixtures&&r.fixtures.length&&!r.groups.length){
      r.groups=r.fixtures.map(f=>migrateV1Fixture(f));
    }
    r.groups.forEach(g=>{if(g.qty===undefined)g.qty=1;if(!g.name)g.name='';});
  });
  if(!j.defaults||!j.defaults.dim){
    j.defaults=j.defaults||{};
    j.defaults={product:'A4',app:'new',shape:'R',install:'NC',rating:'S',from6:false,
      module:'D',lumens:'10',cct:'30',beam:'NS',dim:'T',mFin:'',
      trimStyle:'S',trimFin:'WH',trimOpt:'',rAper:'4',rStyle:'S',rFin:'WH',rAdapter:'',...j.defaults};
  }
  return j;
}
function migrateV1Fixture(f){
  const modMap={'downlight':'D','adjustable':'A'};
  const lumMap={750:'07',1000:'10',1250:'12',1500:'15'};
  const cctMap={'2700K':'27','3000K':'30','3500K':'35','4000K':'40','warm_dim':'3W','tunable_white':'T1'};
  const dimMap={'phasex':'X','dali2':'D','triac':'T'};
  const shapeMap={'round':'R','square':'S'};
  const trimStyleMap={'std':'S','mf':'S','ww':'L','ww_mf':'L','ww_fl':'L','pin':'P','pin_fl':'P','hyp':'H','hyp_fl':'H','ros':'Q','ros_fl':'Q'};
  const trimOptMap={'flanged':'','flangeless':'FL','mf':'MF'};
  const finMap={'white':'WH','black':'BK','bronze':'BZ','clear':'CW','custom':'CC','brass':'BR','copper':'CO','graphite':'GR'};

  const product=f.product||'A4';
  const mod=modMap[f.module]||'D';
  const shape=shapeMap[f.shape]||'R';
  const lumens=lumMap[f.lumens]||'10';
  const cct=cctMap[f.cct]||'30';
  const dim=dimMap[f.dimming||f.dim]||'T';

  let app='new',install='NC',rating='S';
  const oldConst=f.construction||f.app||'new';
  if(oldConst==='remodel')app='remodel';
  else if(oldConst==='retrofit'||oldConst==='retro')app='retro';
  const ncType=f.ncType||'standard';
  const ncMap={'standard':'NC','fire_rated':'NC','chicago':'CP','spray_foam':'SF','low_profile':'LT','super_shallow':'NS','double':'DH','concrete':'CC'};
  install=ncMap[ncType]||f.install||'NC';
  rating=(ncType==='fire_rated'||f.housingStyle==='fire_rated')?'F':'S';

  // Trim
  const oldTrimStyle=f.trimStyle||f.trim||'std';
  const oldTrimType=f.trimType||'flanged';
  let trimStyle=trimStyleMap[oldTrimStyle]||'S';
  let trimOpt=oldTrimType==='flangeless'?'FL':(oldTrimStyle==='mf'?'MF':'');
  const trimFin=finMap[f.trimFinish||f.finish||'white']||'WH';

  return{
    id:f.id||U.uuid(),name:f.notes?f.notes.split('—')[0].trim():'',qty:f.qty||1,
    product,app,shape,install,rating,from6:!!f.from6,
    module:mod,lumens,cct,beam:f.beam||f.beamSpread||'NS',dim,mFin:f.moduleFinish==='black'?'':f.moduleFinish==='white'?'W':'',
    trimStyle,trimFin,trimOpt,
    rAper:'4',rStyle:'S',rFin:'WH',rAdapter:'',
    wetLocation:!!f.wetLocation,notes:f.notes||'',
  };
}

document.getElementById('file-import').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.jobs&&Array.isArray(d.jobs)){
        if(confirm(`Import ${d.jobs.length} job(s)? Adds to existing jobs.`)){
          const existing=new Set(S.jobs.map(j=>j.id));
          d.jobs.forEach(j=>{migrateV1Job(j);if(!existing.has(j.id))S.jobs.push(j);});
          markDirty();save();toast('Imported ✓');App.render();
        }
      }else{alert('Unrecognized file format.');}
    }catch{alert('Invalid JSON file.');}
  };
  reader.readAsText(file);e.target.value='';
});

(function init(){
  // Apply saved theme (default = dark)
  try{
    const t=localStorage.getItem('dmf-theme');
    document.documentElement.setAttribute('data-theme',t||'dark');
  }catch{document.documentElement.setAttribute('data-theme','dark');}
  // Load saved data
  let data=DB.load();
  if(data?.jobs){
    S.jobs=data.jobs.map(j=>migrateV1Job(j));
  }
  // Seed Taghavi if not present
  if(!S.jobs.find(j=>j.id===TAGHAVI_SEED.jobs[0].id)){
    S.jobs.push(...TAGHAVI_SEED.jobs);
    DB.save({v:2,jobs:S.jobs});
  }
  App.render();
})();
</script>
