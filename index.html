<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0D0D0D">
<title>DMF Spec</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--s1:#181818;--s2:#222;--s3:#2A2A2A;
  --gold:#C8A96E;--gold-d:rgba(200,169,110,.18);--gold-b:rgba(200,169,110,.35);
  --txt:#fff;--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.28);
  --bdr:rgba(255,255,255,.07);
  --danger:#FF5252;--danger-d:rgba(255,82,82,.14);
  --warn:#FFB74D;--warn-d:rgba(255,183,77,.14);
  --ok:#69F0AE;--ok-d:rgba(105,240,174,.12);
  --px:#B39DDB;--px-d:rgba(179,157,219,.15);
  --da:#64B5F6;--da-d:rgba(100,181,246,.14);
  --tr:#90A4AE;
  --nav:60px;--hdr:54px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100dvh;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;touch-action:manipulation}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* LAYOUT */
/* LAYOUT */
#app{
  padding-top:var(--hdr);
  padding-bottom:calc(var(--nav) + var(--sb) + 12px);
  min-height:100dvh;
  max-width:680px;
  margin:0 auto;
}
/* Desktop: constrain header and nav to match content width */
@media(min-width:700px){
  #hdr{left:50%;transform:translateX(-50%);width:680px}
  #nav{left:50%;transform:translateX(-50%);width:680px}
  .fab{position:fixed;right:calc(50% - 340px + 18px)}
}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:calc(var(--hdr) + var(--st));
  padding-top:var(--st);
  background:rgba(13,13,13,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:var(--st) 14px 0;gap:10px;
  height:calc(var(--hdr) + var(--st));
}
#hdr-back{
  width:34px;height:34px;border-radius:50%;
  background:var(--s2);display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;transition:opacity .1s;
}
#hdr-back:active{opacity:.6}
#hdr-title{flex:1;font-size:17px;font-weight:600;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hdr-action{flex-shrink:0;display:flex;gap:8px}
.hdr-btn{
  height:32px;padding:0 12px;border-radius:8px;
  background:var(--s2);border:1px solid var(--bdr);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;
}
.hdr-btn:active{opacity:.7}

/* BOTTOM NAV */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav) + var(--sb));
  padding-bottom:var(--sb);
  background:rgba(13,13,13,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--bdr);
  display:flex;align-items:stretch;
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:500;color:var(--txt3);cursor:pointer;touch-action:manipulation;transition:color .15s}
.ni.on{color:var(--gold)}
.ni.off{opacity:.3;pointer-events:none}
.ni-icon{font-size:21px;line-height:1}

/* VIEW */
.view{padding:14px}

/* FAB */
.fab{
  position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);right:18px;
  width:54px;height:54px;border-radius:27px;
  background:var(--gold);color:#0D0D0D;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:300;
  box-shadow:0 4px 18px rgba(200,169,110,.38);
  z-index:80;transition:transform .12s,opacity .12s;
}
.fab:active{transform:scale(.91);opacity:.9}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:15px;margin-bottom:10px}
.card-tap{cursor:pointer;transition:background .12s}
.card-tap:active{background:var(--s2)}

/* JOB CARD */
.jc{display:flex;align-items:center;gap:13px}
.jc-icon{width:44px;height:44px;border-radius:12px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.jc-info{flex:1;min-width:0}
.jc-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jc-meta{font-size:12px;color:var(--txt2);margin-top:2px}
.jc-arr{color:var(--txt3);font-size:18px}

/* ROOM CARD */
.rc{display:flex;align-items:center;gap:12px}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:600}
.rc-meta{font-size:12px;color:var(--txt2);margin-top:2px}
.badge{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--gold);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge-px{background:var(--px-d);border:1px solid rgba(179,157,219,.3);color:var(--px)}
.badge-da{background:var(--da-d);border:1px solid rgba(100,181,246,.25);color:var(--da)}
.badge-tr{background:rgba(144,164,174,.1);border:1px solid rgba(144,164,174,.2);color:var(--tr)}

/* FIXTURE CARD — compact 2-line */
.fc{display:flex;gap:11px;align-items:flex-start}
.fc-qty{width:38px;height:38px;border-radius:10px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0}
.fc-body{flex:1;min-width:0}
.fc-line1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-line2{font-size:12px;color:var(--txt2);margin-top:2px;line-height:1.45}
.fc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--bdr)}
.tag-px{background:var(--px-d);border-color:rgba(179,157,219,.3);color:var(--px)}
.tag-da{background:var(--da-d);border-color:rgba(100,181,246,.25);color:var(--da)}
.tag-tr{background:rgba(144,164,174,.08);border-color:rgba(144,164,174,.18);color:var(--tr)}
.tag-warn{background:var(--warn-d);border-color:rgba(255,183,77,.3);color:var(--warn)}
.tag-auto{background:rgba(200,169,110,.1);border-color:var(--gold-b);color:var(--gold)}

/* SECTION LABEL */
.slabel{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--txt3);margin:18px 0 8px;padding:0 2px}
.slabel:first-child{margin-top:0}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.chips-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-scroll::-webkit-scrollbar{display:none}
.chip{
  padding:8px 14px;border-radius:100px;
  border:1.5px solid var(--bdr);background:var(--s2);
  color:var(--txt2);font-size:13px;font-weight:500;
  white-space:nowrap;flex-shrink:0;
  transition:background .1s,border-color .1s,color .1s;
  touch-action:manipulation;
}
.chip:active{opacity:.7}
.chip.on{background:var(--gold);border-color:var(--gold);color:#0D0D0D;font-weight:600}
.chip.dim{opacity:.28;pointer-events:none}
.chip-lg{padding:11px 18px;font-size:14px;border-radius:12px;text-align:center;line-height:1.3}
.chip-sm{padding:5px 11px;font-size:12px}
.chip-2{width:calc(50% - 4px);text-align:center}

/* FORM */
.fsec{margin-bottom:18px}
.flabel{font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--gold-d);color:var(--gold);text-transform:none;letter-spacing:0}
.finput{
  width:100%;background:var(--s2);border:1.5px solid var(--bdr);
  border-radius:12px;padding:12px 14px;font-size:15px;
  transition:border-color .15s;-webkit-appearance:none;
}
.finput:focus{border-color:var(--gold)}
.qty-wrap{display:flex;align-items:center;background:var(--s2);border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden}
.qty-btn{width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold);transition:background .1s}
.qty-btn:active{background:var(--s3)}
.qty-val{flex:1;text-align:center;font-size:24px;font-weight:700}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--s1);border:1px solid var(--bdr);border-radius:12px}
.toggle-info{}
.toggle-lbl{font-size:15px;font-weight:500}
.toggle-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.tog{width:50px;height:30px;border-radius:15px;background:var(--s3);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.tog.on{background:var(--gold)}
.tog::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}

/* ALERTS */
.alert{padding:11px 13px;border-radius:10px;font-size:13px;line-height:1.4;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start}
.alert-warn{background:var(--warn-d);border:1px solid rgba(255,183,77,.28);color:var(--warn)}
.alert-info{background:var(--da-d);border:1px solid rgba(100,181,246,.22);color:var(--da)}
.alert-ok{background:var(--ok-d);border:1px solid rgba(105,240,174,.22);color:var(--ok)}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty-icon{font-size:46px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:14px;line-height:1.5}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 18px;border-radius:12px;font-size:15px;font-weight:600;transition:opacity .12s,transform .1s;touch-action:manipulation;cursor:pointer}
.btn:active{opacity:.78;transform:scale(.98)}
.btn-gold{background:var(--gold);color:#0D0D0D}
.btn-sec{background:var(--s2);border:1px solid var(--bdr)}
.btn-danger{background:var(--danger-d);border:1px solid rgba(255,82,82,.28);color:var(--danger)}
.btn-full{width:100%}
.btn-row{display:flex;gap:10px}

/* DIVIDER */
.div{height:1px;background:var(--bdr);margin:14px 0}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:13px 10px;text-align:center}
.stat-val{font-size:23px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px}

/* EXPORT BUTTONS */
.xbtn{display:flex;align-items:center;gap:13px;padding:14px;background:var(--s1);border:1px solid var(--bdr);border-radius:14px;margin-bottom:9px;cursor:pointer;transition:background .12s;width:100%;text-align:left}
.xbtn:active{background:var(--s2)}
.xbtn-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.xbtn-info{flex:1}
.xbtn-title{font-size:15px;font-weight:600}
.xbtn-sub{font-size:12px;color:var(--txt2);margin-top:1px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-end}
.modal{background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--bdr);padding:20px 20px calc(20px + var(--sb));width:100%;animation:slideup .22s ease;max-height:85dvh;overflow-y:auto}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}

/* TOASTS */
#toasts{position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:7px;align-items:center;width:calc(100% - 28px);max-width:380px}
.toast{background:var(--s3);border:1px solid var(--bdr);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.4);animation:tin .18s ease,tout .28s ease 2s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}

/* MISC */
.dmf-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.5}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot-px{background:var(--px)}.dot-da{background:var(--da)}.dot-tr{background:var(--tr)}
.mono{font-family:'SF Mono','Courier New',monospace}
.row{display:flex;align-items:center;gap:8px}
.flex1{flex:1}
.ml-auto{margin-left:auto}

/* ══════════════════════════════════════
   ACCORDION KIT CONFIGURATOR
══════════════════════════════════════ */
.kit-shape-bar{
  display:flex;gap:8px;margin-bottom:14px;padding:14px;
  background:var(--s1);border:1px solid var(--bdr);border-radius:14px;
}
.kit-shape-bar .flabel{margin-bottom:0;align-self:center;flex-shrink:0}
.kit-shape-chips{display:flex;gap:8px;flex:1}
.kit-shape-chip{
  flex:1;text-align:center;padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--bdr);background:var(--s2);
  font-size:14px;font-weight:600;color:var(--txt2);
  transition:all .15s;cursor:pointer;
}
.kit-shape-chip.on{background:var(--gold);border-color:var(--gold);color:#0D0D0D}
.kit-shape-chip:active{opacity:.7}

.acc-section{margin-bottom:8px}
.acc-hdr{
  display:flex;align-items:center;gap:11px;
  padding:13px 14px;
  background:var(--s1);border:1.5px solid var(--bdr);border-radius:14px;
  cursor:pointer;transition:border-color .15s,background .12s;
  user-select:none;
}
.acc-hdr.open{border-radius:14px 14px 0 0;border-bottom-color:transparent}
.acc-hdr.complete{border-color:var(--gold-b)}
.acc-hdr.locked{opacity:.38;pointer-events:none}
.acc-hdr:active:not(.locked){background:var(--s2)}
.acc-num{
  width:26px;height:26px;border-radius:50%;
  background:var(--s3);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--txt2);transition:background .15s,color .15s;
}
.acc-hdr.complete .acc-num{background:var(--gold);color:#0D0D0D}
.acc-hdr-info{flex:1;min-width:0}
.acc-title{font-size:14px;font-weight:600}
.acc-summary{font-size:11px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-arr{margin-left:auto;color:var(--txt3);font-size:13px;transition:transform .2s;flex-shrink:0}
.acc-arr.open{transform:rotate(180deg)}
.acc-body{
  background:var(--s1);
  border:1.5px solid var(--bdr);border-top:none;
  border-radius:0 0 14px 14px;padding:16px 14px 14px;
  display:none;
}
.acc-body.open{display:block}
.acc-section.complete .acc-body{border-color:var(--gold-b)}

/* Accessory rows */
.acc-item{
  display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--bdr);
}
.acc-item:last-child{border-bottom:none}
.acc-item-sku{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--gold);min-width:88px;flex-shrink:0}
.acc-item-info{flex:1}
.acc-item-label{font-size:13px;font-weight:500}
.acc-item-note{font-size:11px;color:var(--txt3);margin-top:2px}
.acc-item-star{font-size:10px;font-weight:700;color:var(--warn);margin-right:3px}

/* SKU TABLE */
.sku-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sku-tbl th{text-align:left;padding:7px 9px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);border-bottom:1px solid var(--bdr)}
.sku-tbl td{padding:9px 9px;border-bottom:1px solid var(--bdr);vertical-align:top;line-height:1.4}
.sku-tbl tr:last-child td{border-bottom:none}
.sku-code{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--gold)}

/* BOM */
.bom-group{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;margin-bottom:12px;overflow:hidden}
.bom-group-hdr{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.bom-group-qty{width:34px;height:34px;border-radius:9px;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}
.bom-group-title{font-size:13px;font-weight:600}
.bom-group-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.bom-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bdr);font-size:12px}
.bom-row:last-child{border-bottom:none}
.bom-row-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);min-width:52px;flex-shrink:0;padding-top:1px}
.bom-row-sku{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--gold);min-width:90px;flex-shrink:0}
.bom-row-label{flex:1;color:var(--txt2)}
.bom-row-note{font-size:11px;color:var(--txt3);font-style:italic}
.bom-star{color:var(--warn);font-size:10px;font-weight:700;margin-right:3px}
.bom-total{padding:10px 14px;background:var(--s2);font-size:13px;font-weight:600;text-align:right;color:var(--gold)}
</style>
</head>
<body>
<div id="hdr">
  <button id="hdr-back" style="display:none" onclick="App.back()">‹</button>
  <div id="hdr-title"><span class="dmf-tag">DMF</span> Spec</div>
  <div id="hdr-action"></div>
</div>
<div id="app"></div>
<nav id="nav"></nav>
<div id="toasts"></div>
<input id="file-import" type="file" accept=".json" style="display:none">

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// PRODUCT CONFIG — THE BRAIN
// ═══════════════════════════════════════════════════════════════
const C = {
  wattage:{750:9.5,1000:12.5,1250:14.3,1500:14.3},

  cct:{
    '2700K':        {l:'2700K',          digital:false},
    '3000K':        {l:'3000K',          digital:false},
    '3500K':        {l:'3500K',          digital:false},
    '4000K':        {l:'4000K',          digital:false},
    'warm_dim':     {l:'Warm Dim',       digital:true},
    'tunable_white':{l:'Tunable White',  digital:true},
  },

  dim:{
    phasex:{l:'PhaseX',   min:'0.1%', cls:'tag-px', dot:'dot-px', badge:'badge-px'},
    dali2: {l:'DALI-2',   min:'0.1%', cls:'tag-da', dot:'dot-da', badge:'badge-da'},
    triac: {l:'TRIAC/ELV',min:'1%',   cls:'tag-tr', dot:'dot-tr', badge:'badge-tr', note:'120V only'},
  },

  // Installation types per product
  installations:{
    A4:{
      base:[
        {k:'new',         l:'New Construction'},

// ═══════════════════════════════════════════════════════════════
// AUTO-ACCESSORY EVALUATOR
// ═══════════════════════════════════════════════════════════════
function evalAccessories(f){
  const auto=[];
  const optional=[];

  // Mud plate for flangeless
  if(RULES.flangelessMudPlate.trigger(f)){
    const item=RULES.flangelessMudPlate.autoAdd(f);
    if(!auto.find(a=>a.sku===item.sku))auto.push(item);
  }

  // Router template (optional) for flangeless
  if(RULES.routerTemplate.trigger(f)){
    const item=RULES.routerTemplate.optional(f);
    if(!optional.find(a=>a.sku===item.sku))optional.push(item);
  }

  // A2 precision lock collar
  if(RULES.a2PrecisionCollar.trigger(f)){
    const item=RULES.a2PrecisionCollar.autoAdd();
    if(!auto.find(a=>a.sku===item.sku))auto.push(item);
  }

  // Extension collar always optional
  if(RULES.extensionCollar.trigger(f)){
    const item=RULES.extensionCollar.optional(f);
    if(!optional.find(a=>a.sku===item.sku))optional.push(item);
  }

  return{auto,optional};
}

function getHousingSKU(f){
  const{product,shape,installation,housingStyle,dimming}=f;
  const sh=shape==='round'?'R':'S';
  const hs=housingStyle||'standard';

  if(product==='A4'){
    if(installation==='retrofit')return shape==='round'?'M4KRRETRO6':'M4KSRETRO6';
    if(installation==='concrete')return 'M4CC';
    if(installation==='double')return 'M4DHRS';
    if(installation==='chicago')return`M4CP${sh}S`;
    if(installation==='spray_foam')return`M4SF${sh}S`;
    if(installation==='super_shallow')return`M4NS${sh}S`;
    if(installation==='low_profile')return hs==='fire_rated'?`M4LT${sh}F`:`M4LT${sh}S`;
    if(installation==='remodel')return hs==='fire_rated'?`M4RM${sh}F`:`M4RM${sh}S`;
    // new construction
    if(hs==='fire_rated')return`M4NC${sh}F`;
    return`M4NC${sh}S`;
  }

  if(product==='A2'){
    if(installation==='retrofit')return shape==='round'?'X2KRRETRO6':'X2KSRETRO6';
    if(installation==='chicago')return`X2CP${sh}`;
    if(installation==='remodel'){
      const dig=dimming==='dali2'||dimming==='phasex';
      return shape==='round'?(dig?'X2RDR':'X2RMR'):(dig?'X2RDS':'X2RMS');
    }
    return`X2NC${sh}`;
  }

  return'';
}

function getHousingLabel(f){
  const{product,shape,installation,housingStyle,dimming}=f;
  const hs=housingStyle||'standard';
  if(product==='A4'){
    if(installation==='retrofit')return'Retrofit Kit 6"→4"';
    if(installation==='concrete')return'Concrete';
    if(installation==='double')return'Double Housing';
    if(installation==='chicago')return'Chicago Plenum';
    if(installation==='spray_foam')return'NC Spray Foam';
    if(installation==='super_shallow')return'Super Shallow';
    if(installation==='low_profile')return hs==='fire_rated'?'Low Profile Fire Rated':'Low Profile';
    if(installation==='remodel')return hs==='fire_rated'?'Remodel Fire Rated':'Remodel Standard';
    return hs==='fire_rated'?'NC Fire Rated':'NC Standard';
  }
  if(product==='A2'){
    if(installation==='retrofit')return'Retrofit Kit 6"→2"';
    if(installation==='chicago')return'Chicago Plenum';
    if(installation==='remodel'){const dig=dimming==='dali2'||dimming==='phasex';return dig?'Remodel Digital':'Remodel Analog';}
    return'NC Standard';
  }
  return installation||'';
}

function getTrimSKU(f){
  const{product,module,shape,trimType,trimStyle,trimFinish}=f;
  if(!trimStyle||!trimType)return'';
  const sh=shape==='round'?'R':'S';
  const isFL=trimType==='flangeless';
  const isDec=trimType==='decorative'||trimStyle.startsWith('dec_');
  const FC=C.finishCodes[trimFinish||'white']||'WH';
  const FL=isFL?'FL':'';

  if(product==='A4'){
    if(isDec){
      // Decorative trims have fixed SKUs (no finish variant)
      const decMap={
        dec_of:'M4TRSWHDOF',
        dec_cf:shape==='round'?'M4TRSWHDCF':'M4TSSWHDCF',
        dec_ccfs:'M4TRSWHDCC',
        dec_ccfi:shape==='round'?'M4TRSWHDCCF':'M4TSSWHDCCF',
      };
      return decMap[trimStyle]||'';
    }
    const styleCode={std:'S',ww:'L',pin:'P',hyp:'H',ros:'Q'}[trimStyle]||'S';
    return`M4T${sh}${styleCode}${FC}${FL}`;
  }

  if(product==='A2'){
    const mod=module==='downlight'?'D':'A';
    if(isDec){
      const decMap={
        dec_open:shape==='round'?'X2TRDSWHDO':'X2TSDSWHDO',
        dec_hyp: 'X2TRDSWHDH',
        dec_float:'X2TSDSWHDF',
      };
      return decMap[trimStyle]||'';
    }
    if(trimStyle==='mf')return`X2T${sh}${mod}S${FC}MF`;
    const styleCode={std:'S',ww:'WW',pin:'P',hyp:'H'}[trimStyle]||'S';
    return`X2T${sh}${mod}${styleCode}${FC}${FL}`;
  }

  return'';
}

function getTrimLabel(f){
  const{product,module,shape,trimType,trimStyle}=f;
  if(!trimType||!trimStyle)return'';
  const mod=C.products[product]?.modules[module];
  if(!mod)return trimStyle;
  const list=mod.trimStyles?.[shape]?.[trimType]||[];
  const found=list.find(t=>t.k===trimStyle);
  return found?found.l:trimStyle;
}

function getBeamLabel(f){
  const beam=f.beam||f.beamSpread||null;
  const{product,module,shape}=f;
  if(!beam)return null;
  const beams=C.products[product]?.modules[module]?.beams[shape]||[];
  const b=beams.find(x=>x.k===beam);
  return b?`${b.l} (${b.a})`:beam;
}

// LEGACY FIXTURE MIGRATION (old schema → new kit schema)
// ═══════════════════════════════════════════════════════════════
function migrateFixture(f){
  // Detect old schema: has 'trim' field but not 'trimType'
  if(f.trimType!==undefined)return f; // already new schema

  const trimMap={
    'std':    {trimType:'flanged',    trimStyle:'std'},
    'fl_less':{trimType:'flangeless', trimStyle:'std'},
    'mf':     {trimType:'flanged',    trimStyle:'mf'},
    'ww':     {trimType:'flanged',    trimStyle:'ww'},
    'ww_mf':  {trimType:'flanged',    trimStyle:'ww'},
    'ww_fl':  {trimType:'flangeless', trimStyle:'ww'},
    'pin':    {trimType:'flanged',    trimStyle:'pin'},
    'pin_fl': {trimType:'flangeless', trimStyle:'pin'},
    'hyp':    {trimType:'flanged',    trimStyle:'hyp'},
    'hyp_fl': {trimType:'flangeless', trimStyle:'hyp'},
    'ros':    {trimType:'flanged',    trimStyle:'ros'},
    'ros_fl': {trimType:'flangeless', trimStyle:'ros'},
    'dec_of': {trimType:'decorative', trimStyle:'dec_of'},
    'dec_cf': {trimType:'decorative', trimStyle:'dec_cf'},
    'dec_ccfs':{trimType:'decorative',trimStyle:'dec_ccfs'},
    'dec_ccfi':{trimType:'decorative',trimStyle:'dec_ccfi'},
    'dec_open':{trimType:'decorative',trimStyle:'dec_open'},
    'dec_hyp': {trimType:'decorative',trimStyle:'dec_hyp'},
    'dec_float':{trimType:'decorative',trimStyle:'dec_float'},
  };

  const t=f.trim?trimMap[f.trim]:{trimType:'flanged',trimStyle:'std'};

  // Map old construction + ncType → installation + housingStyle
  let installation='new';
  let housingStyle='standard';

  if(f.construction==='remodel')installation='remodel';
  else if(f.construction==='retrofit')installation='retrofit';
  else if(f.construction==='new'){
    const nc=f.ncType||'standard';
    if(nc==='chicago')installation='chicago';
    else if(nc==='fire_rated'){installation='new';housingStyle='fire_rated';}
    else if(nc==='spray_foam')installation='spray_foam';
    else if(nc==='low_profile')installation='low_profile';
    else if(nc==='super_shallow')installation='super_shallow';
    else if(nc==='double')installation='double';
    else if(nc==='concrete')installation='concrete';
    else installation='new';
  }

  return{
    id:f.id,
    qty:f.qty,
    product:f.product||'A4',
    shape:f.shape||'round',
    installation,
    housingStyle,
    module:f.module||'downlight',
    dimming:f.dimming||'dali2',
    lumens:f.lumens||1000,
    cct:f.cct||'3000K',
    beam:f.beamSpread||null,
    moduleFinish:f.moduleFinish||'white',
    trimType:t?t.trimType:'flanged',
    trimStyle:t?t.trimStyle:'std',
    trimFinish:f.finish||'white',
    accessories:[],
    wetLocation:!!f.wetLocation,
    notes:f.notes||'',
  };
}

function migrateJobFixtures(job){
  if(!job||!job.rooms)return job;
  job.rooms.forEach(r=>{
    r.fixtures=r.fixtures.map(f=>migrateFixture(f));
  });
  return job;
}

// UTILS
// ═══════════════════════════════════════════════════════════════
const U={
  uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16)})},
  today(){return new Date().toISOString().split('T')[0]},
  watts(lm){return C.wattage[lm]||0},
  roomWatts(r){return r.fixtures.reduce((s,f)=>s+(f.qty*U.watts(f.lumens)),0)},
  jobWatts(j){return j.rooms.reduce((s,r)=>s+U.roomWatts(r),0)},
  jobFxCount(j){return j.rooms.reduce((s,r)=>s+r.fixtures.reduce((ss,f)=>ss+f.qty,0),0)},
  roomFxCount(r){return r.fixtures.reduce((s,f)=>s+f.qty,0)},
  esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')},
  cctLabel(k){return C.cct[k]?.l||k},
  dimLabel(k){return C.dim[k]?.l||k},
  resolveJobDimming(j){return j.phasex?.enabled?'phasex':(j.defaults?.dimming||'dali2')},
  resolveRoomDimming(j,r){return r.dimmingOverride||U.resolveJobDimming(j)},
  pxGateways(n){return Math.max(1,Math.ceil(n/64))},
  countPX(j){let n=0;j.rooms.forEach(r=>r.fixtures.forEach(f=>{if(f.dimming==='phasex')n+=f.qty}));return n},
  countByProduct(j,p){let n=0;j.rooms.forEach(r=>r.fixtures.forEach(f=>{if(f.product===p)n+=f.qty}));return n},
  fixtureTitle(f){const p=C.products[f.product];const m=p?.modules[f.module];return`${p?.short||f.product} ${m?.l||f.module}`;},
  fixtureSummary(f){
    const parts=[f.shape.charAt(0).toUpperCase()+f.shape.slice(1),f.lumens+'lm',U.cctLabel(f.cct)];
    if(f.trimType&&f.trimStyle)parts.push(getTrimLabel(f));
    return parts.join(' · ');
  },
};

function toast(msg,dur=2800){

}

function renderHeader(){
  const v=S.view;
  const back=document.getElementById('hdr-back');
  const title=document.getElementById('hdr-title');
  const action=document.getElementById('hdr-action');
  const showBack=v!=='jobs';
  back.style.display=showBack?'flex':'none';
  if(v==='jobs')title.innerHTML='<span class="dmf-tag">DMF</span> Spec';
  else if(v==='job'){const j=getJob();title.textContent=j?.name||'Job';}
  else if(v==='room'){const r=getRoom();title.textContent=r?.name||'Room';}
  else if(v==='fixture')title.textContent=S.isNew?'Add Kit':'Edit Kit';
  else if(v==='reports'){const j=getJob();title.textContent=(j?.name||'Job')+' — Report';}
  let act='';
  if(v==='job'){const j=getJob();if(j)act=`<button class="hdr-btn" onclick="App.editJobSettings('${j.id}')">✏️ Edit</button>`;}
  if(v==='jobs')act=`<button class="hdr-btn" onclick="App.importJSON()">📥 Import</button>`;
  action.innerHTML=act;
}

            ${wetWarn?`<span class="tag tag-warn">⚠️ Damp only</span>`:''}

function renderFixtureForm(){
  const f=S.form;if(!f)return'';
  const prod=C.products[f.product];
  const mod=prod?.modules[f.module];
  const sec=S.formSection||'housing';

  // Auto-evaluate accessories
  const{auto:autoAccs,optional:optAccs}=evalAccessories(f);
  f.accessories=autoAccs;

  // Filtered options
  const validLumens=mod?.lumens||[1000];
  const validDimming=C.cct[f.cct]?.digital?['phasex','dali2']:['phasex','dali2','triac'];
  const validBeams=mod?.beams[f.shape]||[];
  const validTrimTypes=(mod?.trimTypes||['flanged','flangeless']).filter(tt=>
    (mod?.trimStyles[f.shape]?.[tt]||[]).length>0
  );
  const validTrimStyles=mod?.trimStyles?.[f.shape]?.[f.trimType]||[];
  const validFinishes=prod?.finishes||[];
  const standardFinishes=validFinishes.filter(x=>!x.p);
  const premiumFinishes=validFinishes.filter(x=>x.p);
  const installs=[...(C.installations[f.product]?.base||[]),...(f.shape==='round'?C.installations[f.product]?.roundOnly||[]:[] )];
  const showHousingStyle=C.housingStyleInstalls.includes(f.installation);
  const housingStyles=C.housingStyles[f.product]||[];

  // Wet/damp warning
  const wetWarn=f.wetLocation&&mod&&!mod.wet?
    `<div class="alert alert-warn"><span class="alert-icon">⚠️</span><div><b>Damp location only.</b> ${f.product} Adjustable is damp rated, not full wet. Use Downlight for shower installations.</div></div>`:'';
  const twNote=C.cct[f.cct]?.digital?
    `<div class="alert alert-info"><span class="alert-icon">ℹ️</span><div>${U.cctLabel(f.cct)} requires <b>DALI-2 or PhaseX</b> — TRIAC removed.</div></div>`:'';

  // Section bodies
  const housingBody=`
    <div class="fsec"><div class="flabel">Installation Type</div>
      ${chipsScroll(installs,f.installation,'installation')}
    </div>
    ${showHousingStyle&&housingStyles.length>1?`<div class="fsec"><div class="flabel">Housing Style</div>${chipsRow(housingStyles,f.housingStyle,'housingStyle')}</div>`:''}
  `;

  const moduleBody=`
    <div class="fsec"><div class="flabel">Module Type</div>
      <div class="chips">
        ${['downlight','adjustable'].map(mk=>{
          const m=prod?.modules[mk];if(!m)return'';
          return`<button class="chip chip-lg ${f.module===mk?'on':''}" onclick="FF.set('module','${mk}')">${m.l}<br><span style="font-size:10px;opacity:.75">${m.wet?'💧 Wet':'◐ Damp'}</span></button>`;
        }).join('')}
      </div>
    </div>
    <div class="fsec"><div class="flabel">Lumens</div>
      <div class="chips">${[750,1000,1250,1500].map(lm=>{
        const valid=validLumens.includes(lm);
        return`<button class="chip chip-lg ${f.lumens===lm?'on':''} ${valid?'':'dim'}" onclick="FF.set('lumens',${lm})">${lm}<br><span style="font-size:10px;opacity:.7">${C.wattage[lm]}W</span></button>`;
      }).join('')}</div>
    </div>
    <div class="fsec"><div class="flabel">Color Temperature</div>
      ${chipsScroll(prod.cct.map(k=>({k,l:U.cctLabel(k)})),f.cct,'cct')}
    </div>
    ${twNote}
    <div class="fsec"><div class="flabel">Dimming</div>
      <div class="chips">${['phasex','dali2','triac'].map(d=>{
        const valid=validDimming.includes(d);
        return`<button class="chip ${f.dimming===d?'on':''} ${valid?'':'dim'}" onclick="FF.set('dimming','${d}')">${C.dim[d].l}<br><span style="font-size:10px;opacity:.7">${C.dim[d].min}</span></button>`;
      }).join('')}</div>
    </div>
    <div class="fsec"><div class="flabel">Beam Spread <span class="fbadge">optional</span></div>
      ${chipsScroll([{k:'',l:'Not set'},...validBeams.map(b=>({k:b.k,l:`${b.l} (${b.a})`}))],f.beam||'','beam')}
    </div>
    <div class="fsec"><div class="flabel">Module Finish</div>
      <div class="chips">${['white','black'].map(fin=>`<button class="chip ${f.moduleFinish===fin?'on':''}" onclick="FF.set('moduleFinish','${fin}')">${fin.charAt(0).toUpperCase()+fin.slice(1)}</button>`).join('')}</div>
    </div>
  `;

  const trimBody=`
    <div class="fsec"><div class="flabel">Trim Type</div>
      ${chipsRow(validTrimTypes.map(k=>({k,l:k.charAt(0).toUpperCase()+k.slice(1)})),f.trimType,'trimType')}
    </div>
    ${validTrimStyles.length?`<div class="fsec"><div class="flabel">Trim Style</div>${chipsScroll(validTrimStyles,f.trimStyle,'trimStyle')}</div>`:''}
    <div class="fsec"><div class="flabel">Trim Finish</div>
      <div class="chips">${standardFinishes.map(x=>`<button class="chip ${f.trimFinish===x.k?'on':''}" onclick="FF.set('trimFinish','${x.k}')">${x.l}</button>`).join('')}</div>
      ${premiumFinishes.length?`<div style="font-size:10px;color:var(--txt3);letter-spacing:.5px;margin:8px 0 5px">PREMIUM METALLIC</div><div class="chips">${premiumFinishes.map(x=>`<button class="chip ${f.trimFinish===x.k?'on':''}" style="border-color:var(--gold-b)" onclick="FF.set('trimFinish','${x.k}')">${x.l}</button>`).join('')}</div>`:''}
    </div>

  const accBody=`
    ${autoAccs.length?`<div class="slabel" style="margin:0 0 8px">Auto-Added</div>${autoAccs.map(a=>`<div class="card" style="padding:11px 13px;margin-bottom:8px;border-color:rgba(105,240,174,.2)">

      <div style="font-size:13px;margin-top:3px">${U.esc(a.label)}</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:2px">${U.esc(a.note||'')}</div>
    </div>`).join('')}`:''}
    ${optAccs.length?`<div class="slabel" style="margin:10px 0 8px">Optional</div>${optAccs.map(a=>`<div class="card" style="padding:11px 13px;margin-bottom:8px">
      <div class="row"><span class="sku-code">${U.esc(a.sku)}</span></div>
      <div style="font-size:13px;margin-top:3px">${U.esc(a.label)}</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:2px">${U.esc(a.note||'')}</div>
    </div>`).join('')}`:''}
    ${!autoAccs.length&&!optAccs.length?`<div style="font-size:13px;color:var(--txt3)">No accessories required for this configuration.</div>`:''}
  `;

  const notesBody=`
    ${wetWarn}
    <div class="fsec"><div class="flabel">Wet Location</div>
      <div class="toggle-row">
        <div><div class="toggle-lbl">Wet Location Required</div><div class="toggle-sub">${mod?.wet?'✅ Wet rated':'⚠️ Damp location only'}</div></div>
        <button class="tog ${f.wetLocation?'on':''}" onclick="FF.set('wetLocation',${!f.wetLocation})"></button>
      </div>
    </div>
    <div class="fsec"><div class="flabel">Notes <span class="fbadge">optional</span></div>
      <textarea class="finput" rows="3" placeholder="e.g. art lights, high ceiling, shower zone…" oninput="FF.note(this.value)" style="resize:none;line-height:1.5">${U.esc(f.notes)}</textarea>
    </div>
  `;

  return`<div class="view">
    ${twNote&&sec!=='module'?twNote:''}
    <div class="fsec">
      <div class="flabel">Quantity</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="FF.qty(-1)">−</button>
        <div class="qty-val">${f.qty}</div>
        <button class="qty-btn" onclick="FF.qty(1)">+</button>
      </div>
    </div>
    <div class="fsec">
      <div class="flabel">Product</div>
      <div class="chips">${['A2','A4'].map(p=>`<button class="chip chip-lg ${f.product===p?'on':''}" onclick="FF.set('product','${p}')">${C.products[p].l}</button>`).join('')}</div>
    </div>
    <div class="fsec">
      <div class="flabel">Shape <span class="fbadge">drives housing + trim</span></div>
      <div class="chips">
        ${['round','square'].map(s=>`<button class="chip chip-lg ${f.shape===s?'on':''}" onclick="FF.set('shape','${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}
      </div>
    </div>
    ${acc('housing','Housings & Conversion Kits',housingBody,sec==='housing')}
    ${acc('module','Module',moduleBody,sec==='module')}
    ${acc('trim','Trim',trimBody,sec==='trim')}
    ${acc('accessories','Accessories',accBody,sec==='accessories')}
    ${acc('notes','Notes',notesBody,sec==='notes')}
    <div style="height:10px"></div>
    <div class="btn-row">
      <button class="btn btn-sec flex1" onclick="App.back()">Cancel</button>
      <button class="btn btn-gold flex1" onclick="FF.save()">Save Kit</button>
    </div>
    ${!S.isNew?`<button class="btn btn-danger btn-full" style="margin-top:10px" onclick="FF.deleteThis()">Delete</button>`:''}
    <div style="height:20px"></div>
  </div>`;
}

function renderReports(){
  const j=getJob();if(!j)return`<div class="view"><div class="empty"><div class="empty-title">No active job</div></div></div>`;
  const totalFx=U.jobFxCount(j),totalW=U.jobWatts(j),pxFx=U.countPX(j),gateways=pxFx?U.pxGateways(pxFx):0;
  const a2=U.countByProduct(j,'A2'),a4=U.countByProduct(j,'A4');

  const stats=`<div class="stats"><div class="stat"><div class="stat-val">${totalFx}</div><div class="stat-lbl">Fixtures</div></div>
    <div class="stat"><div class="stat-val">${totalW.toFixed(0)}W</div><div class="stat-lbl">Load</div></div>
    <div class="stat"><div class="stat-val">${j.rooms.length}</div><div class="stat-lbl">Rooms</div></div></div>
    <div class="stats"><div class="stat"><div class="stat-val">${a2}</div><div class="stat-lbl">Artafex 2</div></div>
    <div class="stat"><div class="stat-val">${a4}</div><div class="stat-lbl">Artafex 4</div></div>
    <div class="stat"><div class="stat-val">${gateways||'—'}</div><div class="stat-lbl">${gateways?'Gateways':'PhaseX'}</div></div></div>`;

  const roomRows=j.rooms.map(r=>`<div class="card" style="padding:12px 14px">

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">${g.qty}× ${U.esc(g.desc)}</div>

        ${c.price?`<td style="text-align:right;color:var(--gold)">$${c.price}</td>`:'<td></td>'}
      </tr>`).join('')}
    </table>
    ${g.notes.length?`<div style="font-size:11px;color:var(--txt3);margin-top:6px">${g.notes.map(n=>`• ${U.esc(n)}`).join('<br>')}</div>`:''}
  </div>`).join('');

  const exports=`
    <button class="xbtn" onclick="X.json()"><div class="xbtn-icon" style="background:var(--s2)">📦</div><div class="xbtn-info"><div class="xbtn-title">Export JSON</div><div class="xbtn-sub">Full backup · importable</div></div><div style="color:var(--txt3)">›</div></button>
    <button class="xbtn" onclick="X.excel()"><div class="xbtn-icon" style="background:rgba(105,240,174,.1)">📊</div><div class="xbtn-info"><div class="xbtn-title">Export Excel</div><div class="xbtn-sub">Per-room tabs + BOM + overview</div></div><div style="color:var(--txt3)">›</div></button>

  return`<div class="view">${stats}
    <div class="slabel">By Room</div>${roomRows||'<div class="card"><div style="color:var(--txt3);font-size:13px;text-align:center;padding:12px">No rooms</div></div>'}
    <div class="slabel">Bill of Materials</div>${bomRows||'<div class="card"><div style="color:var(--txt3);font-size:13px;text-align:center;padding:12px">No fixtures</div></div>'}
    <div class="slabel">Export</div>${exports}
  </div>`;
}

function buildBOM(j){
  const groups={};
  j.rooms.forEach(r=>r.fixtures.forEach(f=>{
    const hSKU=getHousingSKU(f),tSKU=getTrimSKU(f);
    const key=`${f.product}|${f.module}|${f.shape}|${f.lumens}|${f.cct}|${f.dimming}|${f.trimType}|${f.trimStyle}|${f.trimFinish}`;
    if(!groups[key]){
      const accs=f.accessories||[];
      const notes=[];
      if(f.trimType==='flangeless')notes.push('Flangeless trim — Mud Plate auto-added');
      if(f.product==='A2'&&f.trimStyle==='mf')notes.push('Precision Lock Collar included');
      if(f.dimming==='triac')notes.push('TRIAC/ELV: 120V only');
      if(f.wetLocation&&C.products[f.product]?.modules[f.module]?.wet)notes.push('Wet Location rated');

      const components=[
        hSKU?{sku:hSKU,label:getHousingLabel(f),auto:false,price:0}:null,
        {sku:`${f.product}-${f.module==='downlight'?'DL':'ADJ'} ${f.lumens}lm ${U.cctLabel(f.cct)} ${U.dimLabel(f.dimming)}`,label:'Module',auto:false,price:0},
        tSKU?{sku:tSKU,label:getTrimLabel(f)||'Trim',auto:false,price:0}:null,
        ...accs.map(a=>({sku:a.sku,label:a.label,auto:a.autoAdded,price:a.price||0})),
      ].filter(Boolean);

      groups[key]={qty:0,desc:`${U.fixtureTitle(f)} ${f.shape.charAt(0).toUpperCase()+f.shape.slice(1)} ${U.cctLabel(f.cct)} ${U.dimLabel(f.dimming)}`,components,notes};
    }
    groups[key].qty+=f.qty;
  }));
  return Object.values(groups);
}

const FF={
  section(id){S.formSection=S.formSection===id?null:id;App.render()},
  set(field,val){
    const f=S.form;if(!f)return;
    if(field==='beam'&&val==='')val=null;
    f[field]=val;
    // Cascades
    if(field==='product'){
      const np=C.products[val];
      f.module='downlight';
      const vl=np?.modules.downlight.lumens||[1000];
      if(!vl.includes(f.lumens))f.lumens=vl[vl.length-1];
      f.beam=null;f.trimType='flanged';f.trimStyle='std';
      const vf=np?.finishes.map(x=>x.k)||[];
      if(!vf.includes(f.trimFinish))f.trimFinish='white';
      f.moduleFinish='white';
    }
    if(field==='shape'){
      // Shape is master injector — drives housing + trim shape
      const validTypes=C.products[f.product]?.modules[f.module]?.trimStyles[val]?.[f.trimType]?.map(x=>x.k)||[];
      if(!validTypes.includes(f.trimStyle))f.trimStyle=validTypes[0]||'std';
      f.beam=null;
      // Reset housing if it's round-only and we switched to square
      if(val==='square'&&RULES.roundOnlyInstalls.includes(f.installation))f.installation='new';
    }
    if(field==='module'){
      const vl=C.products[f.product]?.modules[val]?.lumens||[1000];
      if(!vl.includes(f.lumens))f.lumens=vl[vl.length-1];
      f.beam=null;
      const vt=C.products[f.product]?.modules[val]?.trimStyles[f.shape]?.[f.trimType]?.map(x=>x.k)||[];
      if(!vt.includes(f.trimStyle))f.trimStyle=vt[0]||'std';
    }
    if(field==='trimType'){
      const vts=C.products[f.product]?.modules[f.module]?.trimStyles[f.shape]?.[val]?.map(x=>x.k)||[];
      f.trimStyle=vts[0]||'std';
    }
    if(field==='cct'){
      const digital=C.cct[val]?.digital;
      if(digital&&f.dimming==='triac')f.dimming='dali2';
    }
    App.render();
  },
  // setStr merged into set
  qty(delta){const f=S.form;if(!f)return;f.qty=Math.max(1,Math.min(99,f.qty+delta));const el=document.querySelector('.qty-val');if(el)el.textContent=f.qty;},
  note(v){if(S.form)S.form.notes=v},
  save(){
    const f=S.form;if(!f)return;
    const j=getJob(),r=getRoom();if(!j||!r)return;
    // Re-evaluate accessories before save
    const{auto}=evalAccessories(f);f.accessories=auto;
    const idx=r.fixtures.findIndex(x=>x.id===f.id);
    if(idx>=0)r.fixtures[idx]={...f};
    else{if(!f.id)f.id=U.uuid();r.fixtures.push({...f});}
    j.updatedAt=new Date().toISOString();
    markDirty();save();toast('Kit saved ✓');
    S.view='room';S.form=null;App.render();
  },
  deleteThis(){
    const f=S.form;if(!f||!f.id)return;
    if(!confirm('Delete this fixture?'))return;
    const r=getRoom();if(!r)return;
    r.fixtures=r.fixtures.filter(x=>x.id!==f.id);
    markDirty();save();toast('Deleted');
    S.view='room';S.form=null;App.render();
  },
};

document.getElementById('file-import').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.jobs&&Array.isArray(d.jobs)){
        if(confirm(`Import ${d.jobs.length} job(s)?`)){
          const existing=new Set(S.jobs.map(j=>j.id));
          d.jobs.forEach(j=>{
            migrateJobFixtures(j);
            if(!existing.has(j.id))S.jobs.push(j);
          });
          markDirty();save();toast('Imported ✓');App.render();
        }
      }else{alert('Unrecognized format.');}
    }catch{alert('Invalid JSON.');}
  };
  reader.readAsText(file);e.target.value='';
});

(function init(){
  const data=DB.load();
  if(data?.jobs)S.jobs=data.jobs.map(j=>{migrateJobFixtures(j);return j;});
  // Seed Taghavi if not present
  if(!S.jobs.find(j=>j.id===TAGHAVI_SEED.jobs[0]?.id)){
    TAGHAVI_SEED.jobs.forEach(j=>{migrateJobFixtures(j);S.jobs.push(j);});
    DB.save({v:1,jobs:S.jobs});
  }
  App.render();
})();
</script>
</body>
